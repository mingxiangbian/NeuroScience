<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Research Projects | NeuroScience x AI</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='20' fill='%23f4efe3'/%3E%3Cpath fill='%231f2724' d='M39 12C22 21 14 34 14 49c0 16 9 29 25 35-8-13-10-25-5-36-5-10-3-22 5-36Z'/%3E%3Cpath fill='%231f2724' d='M57 12c17 9 25 22 25 37 0 16-9 29-25 35 8-13 10-25 5-36 5-10 3-22-5-36Z'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2724;
        --paper: #f4efe3;
        --paper-soft: #fbf8ef;
        --paper-warm: #e8dcc8;
        --edge: rgba(31, 39, 36, 0.18);
        --blue: #2e6f77;
        --shadow: rgba(42, 35, 25, 0.12);
        font-family:
          "Inter", "SF Pro Display", "PingFang SC", "Noto Sans SC", system-ui,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(rgba(31, 39, 36, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(31, 39, 36, 0.04) 1px, transparent 1px),
          linear-gradient(145deg, var(--paper-soft) 0%, var(--paper) 58%, var(--paper-warm) 100%);
        background-size:
          68px 68px,
          68px 68px,
          auto;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        pointer-events: none;
        background:
          repeating-linear-gradient(9deg, transparent 0 18px, rgba(107, 86, 52, 0.035) 18px 19px),
          repeating-linear-gradient(91deg, transparent 0 32px, rgba(31, 39, 36, 0.026) 32px 33px);
        mix-blend-mode: multiply;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: clamp(22px, 5vw, 56px) 0 48px;
      }

      .home-logo-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: clamp(58px, 7vw, 86px);
        height: clamp(48px, 5.8vw, 70px);
        color: var(--ink);
        text-decoration: none;
      }

      .home-logo-link:hover {
        color: var(--blue);
      }

      .home-logo-link:focus-visible,
      .project-card:focus-visible {
        outline: 2px solid rgba(46, 111, 119, 0.58);
        outline-offset: 4px;
      }

      .title-x-mark {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .title-x-left-bleed,
      .title-x-left-core,
      .title-x-right-core {
        transform-box: fill-box;
        transform-origin: center;
        fill: currentColor;
      }

      .title-x-left-bleed {
        opacity: 0.24;
        filter: blur(0.45px);
      }

      .title-x-left-core {
        opacity: 0.94;
      }

      .title-x-right-core {
        opacity: 0.98;
      }

      .hero {
        display: grid;
        gap: 18px;
        padding: clamp(20px, 5vw, 48px) 0 clamp(22px, 4vw, 38px);
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: 104px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.96;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 430px));
        gap: 14px;
      }

      .project-card {
        display: grid;
        min-height: 172px;
        align-content: end;
        border: 1px solid var(--edge);
        border-radius: 8px;
        background: rgba(251, 248, 239, 0.72);
        padding: 18px;
        color: inherit;
        text-decoration: none;
        box-shadow:
          inset 0 0 0 1px rgba(255, 252, 244, 0.54),
          0 18px 42px var(--shadow);
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .project-card:hover {
        border-color: rgba(46, 111, 119, 0.42);
        background: rgba(251, 248, 239, 0.86);
        transform: translateY(-2px);
      }

      .project-card h2 {
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: 34px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.08;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      @media (max-width: 900px) {
        h1 {
          font-size: 54px;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: calc(100vw - 24px);
          padding-top: 14px;
        }

        .project-grid {
          grid-template-columns: minmax(0, 1fr);
        }

        .project-card h2 {
          font-size: 28px;
        }
      }

      @media (max-width: 420px) {
        h1 {
          font-size: 48px;
        }
      }
    </style>
  </head>
  <body data-page="projects-homepage">
    <div class="shell">
      <header>
        <section class="hero" aria-labelledby="page-title">
          <a class="home-logo-link" href="../index.html" aria-label="Back to NeuroScience x AI homepage">
            <svg class="title-x-mark" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
              <path class="title-x-left-bleed" d="M39 10 C22 19 13 34 13 49 C13 66 23 81 41 88 C32 73 29 59 34 48 C29 38 31 24 39 10 Z" />
              <path class="title-x-left-core" d="M41 13 C26 22 18 35 18 49 C18 63 27 76 41 83 C35 71 33 59 38 48 C33 38 35 25 41 13 Z" />
              <path class="title-x-right-core" d="M55 13 C70 22 78 35 78 49 C78 63 69 76 55 83 C61 71 63 59 58 48 C63 38 61 25 55 13 Z" />
            </svg>
          </a>
          <h1 id="page-title">Research Projects</h1>
        </section>
      </header>

      <main aria-label="Research project modules">
        <section class="project-grid">
          <a class="project-card" href="brain-memory-for-ai-agents/">
            <h2>Brain Memory for AI Agents</h2>
          </a>
        </section>
      </main>
    </div>
  </body>
</html>
