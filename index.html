      function paintInkPaperDisplayBackground(context, canvas, active, selected, accent) {
        const width = DISPLAY_TEXTURE_WIDTH;
        const height = DISPLAY_TEXTURE_HEIGHT;
        const base = selected ? "rgba(250, 247, 238, 0.96)" : active ? "rgba(252, 248, 238, 0.96)" : "rgba(247, 241, 226, 0.94)";
        context.fillStyle = base;
        context.fillRect(0, 0, width, height);

        context.globalAlpha = selected ? 0.18 : active ? 0.12 : 0.07;
        context.strokeStyle = "rgba(63, 54, 39, 0.12)";
        context.lineWidth = 1;
        for (let y = 18; y < height; y += 19) {
          context.beginPath();
          context.moveTo(18, y + Math.sin(y * 0.08) * 2);
          context.bezierCurveTo(
            width * 0.28,
            y - 7,
            width * 0.62,
            y + 7,
            width - 18,
            y + Math.cos(y * 0.05) * 2,
          );
          context.stroke();
        }

        paintInkBleedDisplayEdge(context, canvas, active, selected, accent);

        context.globalAlpha = selected ? 0.32 : active ? 0.22 : 0.14;
        context.strokeStyle = accent;
        context.lineWidth = selected ? 3 : 2;
        context.strokeRect(22, 22, width - 44, height - 44);

        context.globalAlpha = selected ? 0.28 : active ? 0.18 : 0.12;
        context.fillStyle = accent;
        context.fillRect(34, 34, 7, height - 68);
        context.globalAlpha = selected ? 0.12 : active ? 0.08 : 0.05;
        context.fillStyle = "rgba(76, 58, 34, 0.28)";
        context.fillRect(0, 0, width, 4);
        context.fillRect(0, height - 4, width, 4);
        context.globalAlpha = 1;
      }

      function paintInkBleedDisplayEdge(context, canvas, active, selected, accent) {
        const width = DISPLAY_TEXTURE_WIDTH;
        const height = DISPLAY_TEXTURE_HEIGHT;
        const bleedAlpha = selected ? 0.2 : active ? 0.14 : 0.09;
        const edgeInset = selected ? 13 : 16;

        context.save();
        context.globalCompositeOperation = "multiply";
        context.globalAlpha = bleedAlpha;
        context.strokeStyle = "rgba(74, 65, 50, 0.42)";
        context.lineWidth = selected ? 18 : 14;
        context.shadowColor = "rgba(74, 65, 50, 0.32)";
        context.shadowBlur = selected ? 26 : 20;
        context.strokeRect(edgeInset, edgeInset, width - edgeInset * 2, height - edgeInset * 2);

        context.shadowBlur = 0;
        context.globalAlpha = bleedAlpha * 0.72;
        context.strokeStyle = selected ? accent : "rgba(74, 65, 50, 0.32)";
        context.lineWidth = selected ? 6 : 4;
        [
          [edgeInset + 18, edgeInset + 8, width - edgeInset - 26, edgeInset + 4],
          [edgeInset + 12, height - edgeInset - 6, width - edgeInset - 18, height - edgeInset - 11],
          [edgeInset + 9, edgeInset + 18, edgeInset + 5, height - edgeInset - 22],
          [width - edgeInset - 6, edgeInset + 20, width - edgeInset - 11, height - edgeInset - 18],
        ].forEach(([startX, startY, endX, endY], index) => {
          const bend = index < 2 ? height * 0.025 : width * 0.018;
          context.beginPath();
          context.moveTo(startX, startY);
          context.bezierCurveTo(
            (startX + endX) * 0.36,
            startY + (index < 2 ? bend : -bend),
            (startX + endX) * 0.64,
            endY - (index < 2 ? bend : -bend),
            endX,
            endY,
          );
          context.stroke();
        });
        context.restore();
      }

      function paintInkDisplayFrame(context, canvas, active, selected, accent) {
        const width = DISPLAY_TEXTURE_WIDTH;
        const height = DISPLAY_TEXTURE_HEIGHT;
        const outer = selected ? 24 : 26;
        const inner = selected ? 38 : 42;
        const cornerLength = selected ? 68 : active ? 54 : 42;

        context.save();
        context.globalAlpha = selected ? 0.9 : active ? 0.64 : 0.38;
        context.strokeStyle = selected ? accent : "rgba(37, 31, 22, 0.24)";
        context.lineWidth = selected ? 4 : active ? 3 : 2;
        context.strokeRect(outer, outer, width - outer * 2, height - outer * 2);

        context.globalAlpha = selected ? 0.42 : active ? 0.28 : 0.16;
        context.strokeStyle = "rgba(37, 31, 22, 0.38)";
        context.lineWidth = 1.5;
        context.strokeRect(inner, inner, width - inner * 2, height - inner * 2);

        context.globalAlpha = selected ? 0.78 : active ? 0.5 : 0.28;
        context.strokeStyle = accent;
        context.lineWidth = selected ? 5 : 3;
        [
          [outer, outer, 1, 1],
          [width - outer, outer, -1, 1],
          [outer, height - outer, 1, -1],
          [width - outer, height - outer, -1, -1],
        ].forEach(([x, y, sx, sy]) => {
          context.beginPath();
          context.moveTo(x, y + sy * cornerLength);
          context.lineTo(x, y);
          context.lineTo(x + sx * cornerLength, y);
          context.stroke();
        });

        context.globalAlpha = selected ? 0.22 : active ? 0.13 : 0.07;
        context.fillStyle = accent;
        context.fillRect(inner + 8, inner + 8, width - (inner + 8) * 2, 2);
        context.fillRect(inner + 8, height - inner - 10, width - (inner + 8) * 2, 2);
        context.restore();
      }

      function drawWrappedDisplayLine(context, text, x, y, maxWidth, lineHeight, maxLines) {
        const words = text.split(" ");
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const nextLine = line ? `${line} ${word}` : word;
          if (context.measureText(nextLine).width <= maxWidth || !line) {
            line = nextLine;
          } else {
            lines.push(line);
            line = word;
          }
        });
        if (line) {
          lines.push(line);
        }
        lines.slice(0, maxLines).forEach((wrappedLine, index) => {
          const finalLine = index === maxLines - 1 && lines.length > maxLines ? `${wrappedLine.replace(/\.$/, "")}...` : wrappedLine;
          context.fillText(finalLine, x, y + index * lineHeight);
        });
      }

      function fitDisplayFont(context, text, weight, preferredSize, minSize, maxWidth) {
        let size = preferredSize;
        do {
          context.font = `${weight} ${size}px ${DISPLAY_FONT_STACK}`;
          if (context.measureText(text).width <= maxWidth) return size;
          size -= 1;
        } while (size >= minSize);
        context.font = `${weight} ${minSize}px ${DISPLAY_FONT_STACK}`;
        return minSize;
      }

      function getSelectedDisplayCharacterCount(module) {
        return module.region.length + module.folder.length + module.sentence.length;
      }

      function sliceDisplayText(text, revealCharacters) {
        if (!Number.isFinite(revealCharacters)) return text;
        return text.slice(0, clamp(Math.floor(revealCharacters), 0, text.length));
      }

      function paintDisplayTexture(display, module, mode, revealCharacters = Infinity) {
        const { canvas, texture } = display;
        const context = canvas.getContext("2d");
        const accent = getModuleColorCss(module);
        const selectedReveal = mode === "selected" ? revealCharacters : Infinity;
        context.setTransform(1, 0, 0, 1, 0, 0);
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.setTransform(DISPLAY_TEXTURE_SCALE, 0, 0, DISPLAY_TEXTURE_SCALE, 0, 0);

        const active = mode !== "idle";
        const selected = mode === "selected";
        paintInkPaperDisplayBackground(context, canvas, active, selected, accent);
        paintInkDisplayFrame(context, canvas, active, selected, accent);

        context.fillStyle = selected ? DISPLAY_TEXT_INK_STRONG : active ? DISPLAY_TEXT_INK : DISPLAY_TEXT_INK_IDLE;
        context.textBaseline = "top";

        if (selected) {
          const regionReveal = selectedReveal;
          const folderReveal = selectedReveal - module.region.length;
          const sentenceReveal = folderReveal - module.folder.length;
          const regionText = sliceDisplayText(module.region, regionReveal);
          const folderText = sliceDisplayText(module.folder, folderReveal);
          const sentenceText = sliceDisplayText(module.sentence, sentenceReveal);
          const typing = selectedReveal < getSelectedDisplayCharacterCount(module);
          fitDisplayFont(context, module.region, "760", DISPLAY_SELECTED_REGION_FONT_SIZE, 42, DISPLAY_TEXTURE_WIDTH - 94);
          context.fillText(regionText, 56, 28);
          context.font = `680 ${DISPLAY_SELECTED_FOLDER_FONT_SIZE}px ${DISPLAY_FONT_STACK}`;
          context.fillStyle = accent;
          context.fillText(folderText, 56, 118);
          context.font = `560 ${DISPLAY_SELECTED_SENTENCE_FONT_SIZE}px ${DISPLAY_FONT_STACK}`;
          context.fillStyle = DISPLAY_TEXT_INK_MUTED;
          drawWrappedDisplayLine(context, sentenceText, 56, 186, DISPLAY_TEXTURE_WIDTH - 92, 54, 3);
          if (typing) {
            context.fillStyle = accent;
            context.globalAlpha = 0.74 + Math.sin(performance.now() * 0.012) * 0.18;
            context.fillRect(56 + Math.min(context.measureText(sentenceText).width, DISPLAY_TEXTURE_WIDTH - 130), 322, 20, 8);
            context.globalAlpha = 1;
          }
        } else if (active) {
          context.font = `760 ${DISPLAY_EXPANDED_FOLDER_FONT_SIZE}px ${DISPLAY_FONT_STACK}`;
          context.fillText(module.folder, 56, 58);
          fitDisplayFont(context, module.region.replace(" Region", ""), "560", DISPLAY_EXPANDED_REGION_FONT_SIZE, 28, DISPLAY_TEXTURE_WIDTH - 94);
          context.fillStyle = DISPLAY_TEXT_INK_MUTED;
          context.fillText(module.region.replace(" Region", ""), 56, 142);
        } else {
          fitDisplayFont(context, module.folder, "760", DISPLAY_IDLE_FOLDER_FONT_SIZE, 50, DISPLAY_TEXTURE_WIDTH - 94);
          context.fillStyle = DISPLAY_TEXT_INK;
          context.fillText(module.folder, 56, 82);
          context.font = `560 ${DISPLAY_IDLE_STATE_FONT_SIZE}px ${DISPLAY_FONT_STACK}`;
          context.fillStyle = "rgba(18, 23, 21, 0.68)";
          context.fillText("STANDBY", 56, 226);
        }

        context.strokeStyle = selected ? accent : "rgba(37, 31, 22, 0.22)";
        context.lineWidth = selected ? 5 : 3;
        context.strokeRect(16, 16, DISPLAY_TEXTURE_WIDTH - 32, DISPLAY_TEXTURE_HEIGHT - 32);
        context.setTransform(1, 0, 0, 1, 0, 0);
        texture.needsUpdate = true;
      }

      function createDisplayTexture(THREE, module) {
        const canvas = document.createElement("canvas");
        canvas.width = DISPLAY_TEXTURE_WIDTH * DISPLAY_TEXTURE_SCALE;
        canvas.height = DISPLAY_TEXTURE_HEIGHT * DISPLAY_TEXTURE_SCALE;
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 8;
        texture.generateMipmaps = false;
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 1,
          depthWrite: false,
          depthTest: true,
        });
        material.userData.baseOpacity = 1;
        const display = { canvas, texture, material, mode: "", lastPaintKey: "", revealStartedAt: 0 };
        paintDisplayTexture(display, module, "idle");
        return display;
      }

      function setDisplayModuleState(component, module, expanded, selected, dimmed, time = 0) {
        const mode = selected ? "selected" : expanded ? "expanded" : "idle";
        const display = component.userData.display;
        if (display) {
          const enteringSelected = display.mode !== "selected" && mode === "selected";
          if (enteringSelected) {
            display.revealStartedAt = time;
          }
          const selectedCharacters = getSelectedDisplayCharacterCount(module);
          const revealCharacters = mode === "selected"
            ? prefersReducedMotion
              ? selectedCharacters
              : Math.min(selectedCharacters, Math.max(0, (time - display.revealStartedAt) * DISPLAY_TYPEWRITER_CHARS_PER_SECOND))
            : Infinity;
          const paintKey = `${mode}:${Math.floor(revealCharacters)}`;
          if (display.mode !== mode || display.lastPaintKey !== paintKey) {
            paintDisplayTexture(display, module, mode, revealCharacters);
            display.lastPaintKey = paintKey;
          }
          display.mode = mode;
        }
        if (display?.material) {
          const targetOpacity = selected ? 1 : expanded ? 1 : 0.96;
          display.material.opacity = targetOpacity * (dimmed ? 0.62 : 1);
        }
      }

      function createChipModuleComponent(THREE, module, layout) {
        const group = new THREE.Group();
        const component = group;
        const color = new THREE.Color(module.color);
        const baseMaterial = createChipMaterial(THREE, 0xcfc3ad, 0.72, 0.018);
        const bezelMaterial = createChipMaterial(THREE, 0xeee5d5, 0.78, 0.022);
        const screenMaterial = createChipMaterial(THREE, color, 0.2, 0.18);
        const pinMaterial = createLightMaterial(THREE, color, 0.28);
        const edgeMaterial = createLightMaterial(THREE, color, 0.18);
        const display = createDisplayTexture(THREE, module);
        const moduleScale = layout.scale ?? CHIP_DISPLAY_MODULE_SCALE;
        const pinMeshes = [];
        let currentConnectorSide = layout.connectorSide;

        group.name = `${module.id}-chip-display-module`;
        group.userData.moduleId = module.id;
        group.userData.componentType = "project-display";
        group.userData.moduleUrl = getModuleHomepageUrl(module);

        const body = addComponentBox(THREE, group, baseMaterial, 0, 0, 1.18, 0.68, 0.052);
        const bezel = addComponentBox(THREE, group, bezelMaterial, 0, 0, 1.04, 0.54, 0.058);
        const glass = addComponentBox(THREE, group, screenMaterial, 0, 0, 0.94, 0.44, 0.062);
        body.name = "project-display-module-body";
        bezel.name = "project-display-module-bezel";
        glass.name = "project-display-screen";

        const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.94, 0.43), display.material);
        textPlane.name = "project-display-screen-text";
        textPlane.position.set(0, 0, 0.088);
        group.add(textPlane);

        DISPLAY_PIN_OFFSETS.forEach((offset) => {
          const pin = addComponentBox(THREE, group, pinMaterial, 0, 0, 0.07, 0.024, 0.018);
          pin.name = "display-module-pin";
          pin.userData.offset = offset;
          pinMeshes.push(pin);
        });

        function setConnectorSide(connectorSide) {
          currentConnectorSide = connectorSide;
          const verticalConnector = connectorSide === "top" || connectorSide === "bottom";
          pinMeshes.forEach((pin) => {
            const offset = pin.userData.offset / moduleScale;
            pin.rotation.z = verticalConnector ? Math.PI / 2 : 0;
            if (verticalConnector) {
              pin.position.set(offset, connectorSide === "top" ? 0.43 : -0.43, 0.04);
            } else {
              pin.position.set(connectorSide === "left" ? -0.7 : 0.7, offset, 0.04);
            }
          });
        }

        setConnectorSide(layout.connectorSide);

        const edge = new THREE.Mesh(new THREE.BoxGeometry(1.24, 0.74, 0.012), edgeMaterial);
        edge.name = "project-display-edge-glow";
        edge.position.z = 0.032;
        group.add(edge);

        group.userData.display = display;
        group.userData.setDisplayState = (expanded, selected, dimmed, time) => {
          setDisplayModuleState(group, module, expanded, selected, dimmed, time);
        };
        group.userData.setConnectorSide = setConnectorSide;
        group.userData.getConnectorSide = () => currentConnectorSide;
        group.userData.getConnectorPinPoints = () => pinMeshes.map((pin) => (
          pin.position.clone().multiplyScalar(component.scale.x).add(component.position)
        ));
        group.userData.getDisplayAvoidanceBox = () => {
          const scale = component.scale.x;
          const halfWidth = DISPLAY_AVOIDANCE_HALF_WIDTH * scale;
          const halfHeight = DISPLAY_AVOIDANCE_HALF_HEIGHT * scale;
          return {
            left: component.position.x - halfWidth,
            right: component.position.x + halfWidth,
            bottom: component.position.y - halfHeight,
            top: component.position.y + halfHeight,
          };
        };
        group.userData.materials = [baseMaterial, bezelMaterial, screenMaterial, pinMaterial, edgeMaterial];
        return group;
      }

      function createInductionField(THREE) {
        const group = new THREE.Group();
        const materials = [];

        group.name = "induction-field";
        for (let index = 0; index < 3; index += 1) {
          const material = createLightMaterial(THREE, index === 1 ? CYBER_INK_PALETTE.cinnabar : CYBER_INK_PALETTE.flowerBlue, 0.026);
          const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28 + index * 0.24, 0.006, 8, 74), material);
          ring.name = "induction-field-ring";
          ring.position.set(0, 0.42 + index * 0.18, 0.07);
          ring.scale.y = 0.24;
          group.add(ring);
          materials.push(material);
        }

        const columnMaterial = createLightMaterial(THREE, CYBER_INK_PALETTE.inkWhite, 0.022);
        const column = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.3, 0.92, 36, 1, true), columnMaterial);
        column.name = "induction-field-column";
        column.position.set(0, 0.42, 0.04);
        group.add(column);
        materials.push(columnMaterial);

        group.userData.materials = materials;
        return group;
      }

      function getChipLayoutMode() {
        const { isMobile, isPortrait } = getViewportLayout();
        if (isMobile) return "compact";
        return isPortrait ? "portrait" : "desktop";
      }

      function getResponsiveConnectorSide(layout, mode) {
        if (mode === "compact") return layout.compactConnectorSide ?? layout.connectorSide;
        if (mode === "portrait") return layout.portraitConnectorSide ?? layout.connectorSide;
        return layout.connectorSide;
      }

      function getResponsiveRoutePoints(layout, mode) {
        if (mode === "compact") return layout.compactRoute ?? layout.route;
        if (mode === "portrait") return layout.portraitRoute ?? layout.route;
        return layout.route;
      }

      function setCircuitSegmentEndpoints(mesh, start, end, width) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const length = Math.hypot(dx, dy);
        if (length < 0.001) {
          mesh.visible = false;
          return;
        }
        mesh.visible = true;
        mesh.position.set((start.x + end.x) / 2, (start.y + end.y) / 2, (start.z + end.z) / 2);
        mesh.rotation.z = Math.atan2(dy, dx);
        mesh.scale.set(length, width, 1);
      }

      function createCircuitSegmentMesh(THREE, material, name) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 0.022), material);
        mesh.name = name;
        mesh.visible = false;
        return mesh;
      }

      function createCircuitTerminalMesh(THREE, material, name) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.105, 0.052, 0.026), material);
        mesh.name = name;
        mesh.visible = false;
        return mesh;
      }

      function sampleCircuitRoutePath(segmentPairs, progress) {
        if (!segmentPairs.length) {
          return null;
        }

        if (progress < 0 || progress > 1) {
          return null;
        }

        const lengths = segmentPairs.map(([start, end]) => start.distanceTo(end));
        const totalLength = lengths.reduce((sum, length) => sum + length, 0);
        if (totalLength <= 0.001) {
          return segmentPairs[0][0].clone();
        }

        let targetDistance = progress * totalLength;
        for (let index = 0; index < segmentPairs.length; index += 1) {
          const length = lengths[index];
          if (targetDistance <= length) {
            const ratio = length <= 0.001 ? 0 : targetDistance / length;
            return segmentPairs[index][0].clone().lerp(segmentPairs[index][1], ratio);
          }
          targetDistance -= length;
        }

        return segmentPairs.at(-1)[1].clone();
      }

      function getConnectorOutwardDirection(connectorSide) {
        return {
          x: connectorSide === "left" ? -1 : connectorSide === "right" ? 1 : 0,
          y: connectorSide === "top" ? 1 : connectorSide === "bottom" ? -1 : 0,
        };
      }

      function getConnectorFanoutOrigin(routeEnd, pins, connectorSide, avoidanceBox = null) {
        if (avoidanceBox) {
          if (connectorSide === "left") {
            return new THREE.Vector3(avoidanceBox.left - DISPLAY_AVOIDANCE_CLEARANCE, routeEnd.y, routeEnd.z);
          }
          if (connectorSide === "right") {
            return new THREE.Vector3(avoidanceBox.right + DISPLAY_AVOIDANCE_CLEARANCE, routeEnd.y, routeEnd.z);
          }
          if (connectorSide === "top") {
            return new THREE.Vector3(routeEnd.x, avoidanceBox.top + DISPLAY_AVOIDANCE_CLEARANCE, routeEnd.z);
          }
          if (connectorSide === "bottom") {
            return new THREE.Vector3(routeEnd.x, avoidanceBox.bottom - DISPLAY_AVOIDANCE_CLEARANCE, routeEnd.z);
          }
        }

        const middlePin = pins[Math.floor(pins.length / 2)];
        if (!middlePin) {
          return routeEnd.clone();
        }

        const direction = getConnectorOutwardDirection(connectorSide);
        const clearance = 0.26;
        if (direction.x) {
          return new THREE.Vector3(middlePin.x + direction.x * clearance, routeEnd.y, routeEnd.z);
        }
        return new THREE.Vector3(routeEnd.x, middlePin.y + direction.y * clearance, routeEnd.z);
      }

      function addCircuitPair(pairs, start, end, width) {
        if (start.distanceTo(end) < 0.001) {
          return null;
        }

        const pair = [start.clone(), end.clone(), width];
        pairs.push(pair);
        return pair;
      }

      function clampRouteInteriorToFanout(points, fanoutOrigin, connectorSide) {
        points.forEach((point, index) => {
          if (index === 0 || index === points.length - 1) {
            return;
          }

          if (connectorSide === "left" && point.x > fanoutOrigin.x) {
            point.x = fanoutOrigin.x;
          }
          if (connectorSide === "right" && point.x < fanoutOrigin.x) {
            point.x = fanoutOrigin.x;
          }
          if (connectorSide === "top" && point.y < fanoutOrigin.y) {
            point.y = fanoutOrigin.y;
          }
          if (connectorSide === "bottom" && point.y > fanoutOrigin.y) {
            point.y = fanoutOrigin.y;
          }
        });
      }

      function createOrthogonalPinFanout(THREE, routeEnd, pins, connectorSide) {
        const fanoutOrigin = routeEnd.clone();
        const verticalConnector = connectorSide === "top" || connectorSide === "bottom";
        const branchSegments = [];
        const branchFlowPaths = [];

        pins.forEach((pin) => {
          const pinBranchSegments = [];
          const elbow = verticalConnector
            ? new THREE.Vector3(pin.x, fanoutOrigin.y, fanoutOrigin.z)
            : new THREE.Vector3(fanoutOrigin.x, pin.y, fanoutOrigin.z);

          addCircuitPair(pinBranchSegments, fanoutOrigin, elbow, 0.018);
          addCircuitPair(pinBranchSegments, elbow, pin, 0.018);
          branchSegments.push(...pinBranchSegments);
          branchFlowPaths.push(pinBranchSegments.map(([start, end]) => [start.clone(), end.clone()]));
        });

        return { fanoutOrigin, branchSegments, branchFlowPaths };
      }

      function createCircuitRouteChannel(THREE, module) {
        const group = new THREE.Group();
        const traceMaterial = createLightMaterial(THREE, module.color, 0.14);
        const terminalMaterial = createLightMaterial(THREE, module.color, 0.2);
        const particleMaterial = createLightMaterial(THREE, module.color, 0.72);
        const segments = [];
        const nodes = [];
        const terminals = [];
        const particles = [];
        let currentSegmentPairs = [];
        let currentFlowPaths = [];

        group.name = `${module.id}-pcb-routing-channel`;
        for (let index = 0; index < 10; index += 1) {
          const segment = createCircuitSegmentMesh(
            THREE,
            traceMaterial,
            index < 4 ? "pcb-routing-channel" : "display-pin-route",
          );
          segments.push(segment);
          group.add(segment);
        }

        for (let index = 0; index < 5; index += 1) {
          const node = createCircuitTerminalMesh(THREE, terminalMaterial, "pcb-routing-via");
          nodes.push(node);
          group.add(node);
        }

        for (let index = 0; index < 3; index += 1) {
          const terminal = createCircuitTerminalMesh(THREE, terminalMaterial, "display-pin-terminal");
          terminals.push(terminal);
          group.add(terminal);
        }

        for (let index = 0; index < 5; index += 1) {
          const particle = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 8), particleMaterial);
          particle.name = "circuit-flow-particle";
          particle.visible = false;
          particle.userData.phase = index / 5;
          particles.push(particle);
          group.add(particle);
        }

        group.userData.materials = [traceMaterial, terminalMaterial, particleMaterial];
        group.userData.setCircuitRoute = (routePoints, connectorSide, pinPoints, displayAvoidanceBox) => {
          const points = routePoints.map(([x, y, z]) => new THREE.Vector3(x, y, z + 0.035));
          const routeEnd = points.at(-1);
          const segmentPairs = [];
          const routePairs = [];
          const flowPaths = [];

          const pins = pinPoints.map((pinPoint) => {
            const pin = pinPoint.clone();
            pin.z += 0.035;
            return pin;
          });
          const fanoutOrigin = getConnectorFanoutOrigin(routeEnd, pins, connectorSide, displayAvoidanceBox);
          points[points.length - 1] = fanoutOrigin;
          clampRouteInteriorToFanout(points, fanoutOrigin, connectorSide);

          for (let index = 1; index < points.length; index += 1) {
            const pair = [points[index - 1], points[index], 0.032];
            routePairs.push(pair);
            segmentPairs.push(pair);
          }

          const fanout = createOrthogonalPinFanout(THREE, fanoutOrigin, pins, connectorSide);

          segmentPairs.push(...fanout.branchSegments);
          fanout.branchFlowPaths.forEach((pinFlowPath) => {
            flowPaths.push([
              ...routePairs,
              ...pinFlowPath,
            ].map(([start, end]) => [start.clone(), end.clone()]));
          });

          segments.forEach((segment, index) => {
            const pair = segmentPairs[index];
            if (!pair) {
              segment.visible = false;
              return;
            }
            setCircuitSegmentEndpoints(segment, pair[0], pair[1], pair[2]);
          });

          nodes.forEach((node, index) => {
            const point = points[index + 1];
            if (!point) {
              node.visible = false;
              return;
            }
            node.visible = true;
            node.position.copy(point);
            node.rotation.z = 0;
          });

          terminals.forEach((terminal, index) => {
            const point = pinPoints[index];
            if (!point) {
              terminal.visible = false;
              return;
            }
            terminal.visible = true;
            terminal.position.set(point.x, point.y, point.z + 0.035);
            terminal.rotation.z = connectorSide === "top" || connectorSide === "bottom" ? Math.PI / 2 : 0;
          });

          currentSegmentPairs = segmentPairs.map(([start, end]) => [start.clone(), end.clone()]);
          currentFlowPaths = flowPaths.length ? flowPaths : [currentSegmentPairs];
        };

        group.userData.setCircuitState = (expanded, selected, dimmed, time) => {
          const traceOpacity = expanded ? selected ? 0.34 : dimmed ? 0.055 : 0.13 : 0;
          const terminalOpacity = expanded ? selected ? 0.5 : dimmed ? 0.07 : 0.17 : 0;
          const particleOpacity = expanded ? selected ? 0.78 : dimmed ? 0 : 0.28 : 0;
          traceMaterial.opacity = traceOpacity;
          terminalMaterial.opacity = terminalOpacity;
          particleMaterial.opacity = particleOpacity;
          const flowCycleLength = 1.35;

          particles.forEach((particle, index) => {
            const path = currentFlowPaths[index % currentFlowPaths.length];
            const progress = prefersReducedMotion
              ? particle.userData.phase * 0.86
              : (time * 0.22 + particle.userData.phase * flowCycleLength) % flowCycleLength;
            const point = particleOpacity > 0.05 && progress <= 1 && path
              ? sampleCircuitRoutePath(path, progress)
              : null;
            if (!point || progress > 1) {
              particle.visible = false;
              return;
            }
            particle.visible = true;
            particle.position.copy(point);
          });

          group.visible = traceOpacity > 0.01 || terminalOpacity > 0.01 || particleOpacity > 0.01;
        };

        group.userData.setCircuitState(false, false, false, 0);
        return group;
      }

      function createGpuChipPedestal(THREE) {
        const group = new THREE.Group();
        const state = { active: 0 };
        const boardMaterial = createChipMaterial(THREE, 0x5a5244, 0.42, 0.006);
        boardMaterial.roughness = 0.82;
        boardMaterial.metalness = 0.02;
        boardMaterial.clearcoat = 0.18;
        const boardEdgeMaterial = new THREE.MeshBasicMaterial({
          color: 0x7d7362,
          transparent: true,
          opacity: 0.08,
          depthWrite: false,
          depthTest: true,
        });
        boardEdgeMaterial.userData.baseOpacity = 0.08;
        const coreMaterial = createChipMaterial(THREE, 0x1a1c17, 0.66, 0.05);
        const coreLightMaterial = createLightMaterial(THREE, CYBER_INK_PALETTE.flowerBlue, 0.14);
        const board = new THREE.Mesh(new THREE.BoxGeometry(3.72, 1.24, 0.075), boardMaterial);
        const boardEdge = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.02, 0.018), boardEdgeMaterial);
        const computeCore = new THREE.Group();
        const inductionField = createInductionField(THREE);
        const initialCoreY = CHIP_CORE_Y_BY_LAYOUT.desktop;

        group.name = "gpu-chip-pedestal";
        board.name = "gpu-chip-substrate";
        boardEdge.name = "gpu-chip-edge-glow";
        board.position.y = initialCoreY;
        boardEdge.position.set(0, initialCoreY, 0.048);
        computeCore.name = "compute-pedestal-core";
        computeCore.position.y = initialCoreY;
        inductionField.position.y = initialCoreY;

        const coreBase = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.32, 0.058), coreMaterial);
        const coreInset = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.16, 0.066), coreLightMaterial);
        coreBase.name = "compute-pedestal-core-base";
        coreInset.name = "compute-pedestal-core-light";
        coreBase.position.z = 0.08;
        coreInset.position.z = 0.12;
        computeCore.add(coreBase, coreInset);

        group.add(board, boardEdge, computeCore, inductionField);

        const channels = CHIP_LAYOUT.map((layout) => {
          const module = MODULES.find((candidate) => candidate.id === layout.id);
          const component = createChipModuleComponent(THREE, module, layout);
          const route = createCircuitRouteChannel(THREE, module);
          component.position.set(...layout.position);
          component.userData.baseScale = layout.scale ?? CHIP_DISPLAY_MODULE_SCALE;
          component.scale.setScalar(component.userData.baseScale);
          group.add(route, component);
          return { module, layout, component, route };
        });

        function syncCircuitRoute(entry, mode) {
          const routePoints = getResponsiveRoutePoints(entry.layout, mode);
          const connectorSide = getResponsiveConnectorSide(entry.layout, mode);
          const pinPoints = entry.component.userData.getConnectorPinPoints?.() ?? [];
          const displayAvoidanceBox = entry.component.userData.getDisplayAvoidanceBox?.();
          entry.route.userData.setCircuitRoute?.(routePoints, connectorSide, pinPoints, displayAvoidanceBox);
        }

        const allCoreMaterials = [boardEdgeMaterial, coreLightMaterial, ...inductionField.userData.materials];
        return {
          group,
          getDisplayTargets() {
            return channels.map((entry) => entry.component);
          },
          resize() {
            const { isMobile, isPortrait } = getViewportLayout();
            const mode = getChipLayoutMode();
            const coreY = CHIP_CORE_Y_BY_LAYOUT[mode];
            group.position.set(0, isMobile ? -0.04 : isPortrait ? -0.02 : -0.08, -1.48);
            group.scale.setScalar(isMobile ? 0.64 : isPortrait ? 0.76 : 1.02);
            group.rotation.x = isMobile ? -0.01 : isPortrait ? -0.012 : -0.018;
            board.position.y = coreY;
            boardEdge.position.y = coreY;
            computeCore.position.y = coreY;
            inductionField.position.y = coreY;
            channels.forEach((entry) => {
              const position = mode === "compact"
                ? entry.layout.compactPosition
                : mode === "portrait"
                  ? entry.layout.portraitPosition
                  : entry.layout.position;
              entry.component.position.set(...position);
              entry.component.userData.setConnectorSide?.(getResponsiveConnectorSide(entry.layout, mode));
              syncCircuitRoute(entry, mode);
            });
          },
          update(time, interactionState) {
            const expanded = Boolean(interactionState?.expanded);
            const selected = interactionState?.selected ?? null;
            const mode = getChipLayoutMode();
            const target = expanded ? 1 : 0;
            state.active += (target - state.active) * (prefersReducedMotion ? 1 : 0.075);
            const eased = state.active * state.active * (3 - 2 * state.active);

            setChipMaterialState(boardMaterial, 0.36 + eased * 0.12, 0.006 + eased * 0.018);
            allCoreMaterials.forEach((material) => {
              setChipMaterialState(material, (material.userData.baseOpacity ?? 0.08) * (1 + eased * 2.1));
            });
            computeCore.scale.setScalar(1 + eased * 0.06 + (selected ? 0.03 : 0));

            channels.forEach((entry) => {
              const selectedFocus = !selected || selected === entry.module.id ? 1 : 0.22;
              const componentOpacity = (0.32 + eased * (selected === entry.module.id ? 0.52 : 0.26)) * selectedFocus;
              const componentGlow = 0.08 + eased * (selected === entry.module.id ? 0.34 : 0.12);
              entry.component.userData.setDisplayState?.(
                expanded,
                selected === entry.module.id,
                Boolean(selected && selected !== entry.module.id),
                time,
              );

              entry.component.userData.materials.forEach((material) => {
                setChipMaterialState(
                  material,
                  componentOpacity * (material.userData.baseOpacity ?? 0.35) * 1.8,
                  componentGlow,
                );
              });

              const baseScale = entry.component.userData.baseScale ?? 1;
              entry.component.scale.setScalar(baseScale * (1 + eased * (selected === entry.module.id ? 0.32 : 0.03)));
              syncCircuitRoute(entry, mode);
              entry.route.userData.setCircuitState?.(
                expanded,
                selected === entry.module.id,
                Boolean(selected && selected !== entry.module.id),
                time,
              );
            });
          },
        };
      }

      function createScene(THREE) {
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(CYBER_INK_PALETTE.paperBase, 0.022);

        const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.2, 6.7);

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
          powerPreference: "high-performance",
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.94;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        host.appendChild(renderer.domElement);

        const ambient = new THREE.HemisphereLight(CYBER_INK_PALETTE.paperBase, 0x4e554d, 1.24);
        const key = new THREE.DirectionalLight(CYBER_INK_PALETTE.inkWhite, 2.6);
        key.position.set(-3.8, 4.5, 4.4);
        key.castShadow = true;
        key.shadow.mapSize.width = 1024;
        key.shadow.mapSize.height = 1024;

        const rim = new THREE.DirectionalLight(CYBER_INK_PALETTE.flowerBlue, 1.65);
        rim.position.set(4.2, 2.1, -3.4);

        const fill = new THREE.PointLight(CYBER_INK_PALETTE.cinnabar, 0.95, 8);
        fill.position.set(0, -1.8, 3.8);

        const warmEdge = new THREE.PointLight(CYBER_INK_PALETTE.mineralGold, 0.82, 7);
        warmEdge.position.set(-2.4, 0.8, 2.5);
        scene.add(ambient, key, rim, fill, warmEdge);

        const brain = new THREE.Group();
        brain.name = "brain-control-root";
        scene.add(brain);

        const shellGeometry = new THREE.SphereGeometry(2.34, 80, 40);
        const shellMaterial = new THREE.MeshBasicMaterial({
          color: CYBER_INK_PALETTE.paperWhite,
          transparent: true,
          opacity: 0.045,
          depthWrite: false,
          side: THREE.BackSide,
        });
        const shell = new THREE.Mesh(shellGeometry, shellMaterial);
        shell.scale.set(1.28, 0.82, 0.9);
        shell.position.set(0, 0.02, -0.04);
        scene.add(shell);

        return { scene, camera, renderer, brain, shell };
      }

      function findDisplayModuleFromObject(object) {
        let current = object;
        while (current) {
          if (current.userData?.componentType === "project-display" && current.userData?.moduleUrl) {
            return current;
          }
          current = current.parent;
        }
        return null;
      }

      function setupControls(
        view,
        onBrainTap,
        getInteractionState = () => ({ expanded: false }),
        displayTargets = [],
        onDisplayTap = null,
      ) {
        const rotation = {
          x: view.brain.rotation.x,
          y: view.brain.rotation.y,
          targetX: view.brain.rotation.x,
          targetY: view.brain.rotation.y,
        };
        let cameraZ = view.camera.position.z;
        let targetCameraZ = cameraZ;
        let dragging = false;
        let previousX = 0;
        let previousY = 0;
        let dragDistance = 0;

        const canvas = view.renderer.domElement;
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function pickDisplayModule(event) {
          if (!getInteractionState().expanded || displayTargets.length === 0) return null;
          const rect = canvas.getBoundingClientRect();
          pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
          pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
          raycaster.setFromCamera(pointer, view.camera);
          const hits = raycaster.intersectObjects(displayTargets, true);
          if (hits.length === 0) return null;
          return findDisplayModuleFromObject(hits[0].object);
        }

        canvas.addEventListener("pointerdown", (event) => {
          dragging = true;
          previousX = event.clientX;
          previousY = event.clientY;
          dragDistance = 0;
          canvas.style.cursor = "grabbing";
          canvas.setPointerCapture(event.pointerId);
        });

        canvas.addEventListener("pointermove", (event) => {
          if (!dragging) {
            canvas.style.cursor = pickDisplayModule(event) ? "pointer" : "grab";
            return;
          }
          const dx = event.clientX - previousX;
          const dy = event.clientY - previousY;
          previousX = event.clientX;
          previousY = event.clientY;
          dragDistance += Math.abs(dx) + Math.abs(dy);
          rotation.targetY += dx * 0.006;
          rotation.targetX = clamp(rotation.targetX + dy * 0.0045, -0.72, 0.48);
        });

        canvas.addEventListener("pointerup", (event) => {
          dragging = false;
          if (canvas.hasPointerCapture(event.pointerId)) {
            canvas.releasePointerCapture(event.pointerId);
          }
          if (dragDistance < 9) {
            const displayModule = pickDisplayModule(event);
            if (displayModule) {
              onDisplayTap?.(displayModule);
              canvas.style.cursor = "pointer";
              return;
            }
            onBrainTap?.();
          }
          canvas.style.cursor = pickDisplayModule(event) ? "pointer" : "grab";
        });

        canvas.addEventListener("pointercancel", () => {
          dragging = false;
          canvas.style.cursor = "grab";
        });

        canvas.addEventListener(
          "wheel",
          (event) => {
            event.preventDefault();
            targetCameraZ = clamp(targetCameraZ + event.deltaY * 0.004, 4.8, 9.4);
          },
          { passive: false },
        );

        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape" || event.key.toLowerCase() === "r") {
            rotation.targetX = INITIAL_ROTATION.x;
            rotation.targetY = INITIAL_ROTATION.y;
            const { isMobile, isPortrait } = getViewportLayout();
            targetCameraZ = isMobile ? 8.9 : isPortrait ? 8.45 : 6.7;
          }
        });

        return {
          update() {
            if (!prefersReducedMotion && !dragging && !getInteractionState().expanded) {
              rotation.targetY += 0.0012;
            }
            rotation.x += (rotation.targetX - rotation.x) * 0.09;
            rotation.y += (rotation.targetY - rotation.y) * 0.09;
            cameraZ += (targetCameraZ - cameraZ) * 0.08;
            view.brain.rotation.x = rotation.x;
            view.brain.rotation.y = rotation.y;
            view.camera.position.z = cameraZ;
          },
          resize() {
            const { width, height, isMobile, isPortrait } = getViewportLayout();
            view.camera.aspect = width / height;
            view.camera.position.z = isMobile ? 8.9 : isPortrait ? 8.45 : 6.7;
            targetCameraZ = view.camera.position.z;
            cameraZ = view.camera.position.z;
            view.camera.updateProjectionMatrix();
            view.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            view.renderer.setSize(width, height);
            view.brain.scale.setScalar(isMobile ? 0.7 : isPortrait ? 0.82 : 1.16);
            view.brain.position.y = isMobile ? -0.08 : isPortrait ? -0.02 : -0.12;
            view.shell.scale.set(
              isMobile ? 0.98 : isPortrait ? 1.08 : 1.28,
              isMobile ? 0.66 : isPortrait ? 0.7 : 0.82,
              isMobile ? 0.7 : isPortrait ? 0.76 : 0.9,
            );
          },
        };
      }

      async function boot() {
        if (forceFallback) {
          const fallbackUi = setupModuleUi(null);
          fallbackUi.toggleExpanded();
          activateFallback();
          return;
        }

        try {
          const view = createScene(THREE);
          const brainModel = await loadBrainModel();
          const activityFlow = createSulcalActivityFlow(THREE, brainModel);
          const explodedView = createExplodedResearchModules(THREE, brainModel);
          const gpuPedestal = createGpuChipPedestal(THREE);
          const moduleUi = setupModuleUi(explodedView);
          view.brain.clear();
          view.scene.add(gpuPedestal.group);
          view.brain.add(brainModel, activityFlow, explodedView.group);
          const controls = setupControls(
            view,
            moduleUi.toggleExpanded,
            moduleUi.getState,
            gpuPedestal.getDisplayTargets(),
            (moduleTarget) => {
              window.location.assign(moduleTarget.userData.moduleUrl);
            },
          );
          controls.resize();
          gpuPedestal.resize();
          document.body.classList.add("webgl-ready");
          document.body.classList.remove("fallback-active");

          const clock = new THREE.Clock();

          function render() {
            const elapsed = clock.getElapsedTime();
            controls.update();
            activityFlow.userData.update(elapsed);
            explodedView.update(elapsed, view.brain, activityFlow);
            gpuPedestal.update(elapsed, moduleUi.getState());
            view.shell.rotation.y += prefersReducedMotion ? 0 : 0.0007;
            view.renderer.render(view.scene, view.camera);
            app = requestAnimationFrame(render);
          }

          window.addEventListener("resize", () => {
            controls.resize();
            gpuPedestal.resize();
          });
          render();
        } catch (error) {
          console.warn("3D brain model unavailable; fallback brain displayed.", error);
          if (app) cancelAnimationFrame(app);
          activateFallback();
        }
      }

      boot();
    </script>
  </body>
</html>
