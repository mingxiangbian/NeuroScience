<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Interactive NeuroScience x AI homepage with a controllable 3D brain model."
    />
    <title>NeuroScience × AI</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8f4ef;
        --muted: rgba(248, 244, 239, 0.72);
        --glass: rgba(255, 255, 255, 0.105);
        --glass-line: rgba(255, 255, 255, 0.22);
        --accent-a: #8ff3ff;
        --accent-b: #ff8a8a;
        --accent-c: #ffd36a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(145deg, rgba(7, 9, 13, 0.96), rgba(19, 17, 18, 0.94)),
          linear-gradient(90deg, #11151c, #201716 52%, #0d1117);
      }

      body::before {
        position: fixed;
        inset: 0;
        content: "";
        pointer-events: none;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px);
        background-size: 62px 62px;
        mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 78%, transparent 100%);
        opacity: 0.46;
      }

      #brain-stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        touch-action: none;
        isolation: isolate;
      }

      #brain-stage canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: grab;
        outline: none;
      }

      #brain-stage canvas:active {
        cursor: grabbing;
      }

      .title-plane {
        position: absolute;
        top: clamp(28px, 7vh, 72px);
        left: 50%;
        z-index: 2;
        width: min(88vw, 1120px);
        transform: translateX(-50%);
        pointer-events: none;
        text-align: center;
      }

      h1 {
        margin: 0;
        white-space: nowrap;
        font-size: clamp(2.1rem, 7.4vw, 7.8rem);
        font-weight: 760;
        line-height: 0.95;
        letter-spacing: 0;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.26),
          0 20px 58px rgba(0, 0, 0, 0.62),
          0 0 34px rgba(143, 243, 255, 0.22);
      }

      .glass-rim {
        position: absolute;
        left: 50%;
        top: calc(clamp(28px, 7vh, 72px) + clamp(3.2rem, 8vw, 8.4rem));
        z-index: 2;
        width: min(54vw, 720px);
        height: 1px;
        transform: translateX(-50%);
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.54), transparent);
        box-shadow: 0 0 26px rgba(143, 243, 255, 0.22);
      }

      .region-panel {
        position: absolute;
        left: 50%;
        bottom: clamp(28px, 6vh, 72px);
        z-index: 2;
        display: grid;
        grid-template-columns: auto auto;
        gap: 10px 18px;
        align-items: center;
        min-width: min(420px, calc(100vw - 32px));
        padding: 16px 20px;
        transform: translateX(-50%);
        border: 1px solid var(--glass-line);
        border-radius: 8px;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05)),
          rgba(10, 12, 16, 0.36);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.24),
          0 26px 70px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(22px) saturate(1.3);
      }

      .region-panel::before {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        content: "";
        background: linear-gradient(135deg, var(--accent-a), var(--accent-c), var(--accent-b));
        box-shadow: 0 0 24px rgba(255, 211, 106, 0.58);
      }

      .region-panel strong,
      .region-panel span {
        display: block;
        min-width: 0;
      }

      .region-panel strong {
        font-size: clamp(1rem, 2.8vw, 1.28rem);
        font-weight: 740;
        line-height: 1;
      }

      .region-panel span {
        grid-column: 2;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.1;
      }

      .vignette {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.18), transparent 26%, transparent 74%, rgba(0, 0, 0, 0.35)),
          linear-gradient(90deg, rgba(0, 0, 0, 0.34), transparent 26%, transparent 74%, rgba(0, 0, 0, 0.34));
      }

      @media (max-width: 720px) {
        .title-plane {
          top: 34px;
          width: 94vw;
        }

        h1 {
          font-size: clamp(1.85rem, 9.2vw, 3.4rem);
        }

        .glass-rim {
          top: 86px;
          width: 78vw;
        }

        .region-panel {
          bottom: 24px;
          grid-template-columns: auto 1fr;
          padding: 13px 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #brain-stage canvas {
          cursor: default;
        }
      }
    </style>
  </head>
  <body>
    <main id="brain-stage" data-region="cortex" aria-label="Interactive 3D brain model">
      <div class="title-plane" aria-hidden="true">
        <h1>NeuroScience × AI</h1>
      </div>
      <div class="glass-rim" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="region-panel" aria-live="polite">
        <strong id="region-title">Cortex</strong>
        <span id="region-target">Knowledge</span>
      </div>
    </main>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

      const stage = document.getElementById("brain-stage");
      const regionTitle = document.getElementById("region-title");
      const regionTarget = document.getElementById("region-target");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0a0b0f, 0.035);

      const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0.18, 7.2);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.03;
      stage.prepend(renderer.domElement);

      const hemiLight = new THREE.HemisphereLight(0xfff1e6, 0x141a24, 1.85);
      scene.add(hemiLight);

      const keyLight = new THREE.DirectionalLight(0xffdfc8, 3.1);
      keyLight.position.set(-3.8, 4.6, 5.5);
      scene.add(keyLight);

      const rimLight = new THREE.DirectionalLight(0x9df8ff, 2.1);
      rimLight.position.set(4.2, 2.3, -3.6);
      scene.add(rimLight);

      const brainGroup = new THREE.Group();
      const coreGroup = new THREE.Group();
      const cortexGroup = new THREE.Group();
      const signalGroup = new THREE.Group();
      brainGroup.add(coreGroup, cortexGroup, signalGroup);
      brainGroup.rotation.set(-0.07, -0.22, 0);
      scene.add(brainGroup);

      const interactiveMeshes = [];
      let selectedRegion = "cortex";
      let hoveredRegion = null;
      let selectionProgress = 1;
      let targetSelectionProgress = 1;

      const tissueMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xe7a596,
        roughness: 0.58,
        metalness: 0.02,
        clearcoat: 0.32,
        clearcoatRoughness: 0.58,
        sheen: 0.45,
        sheenColor: 0xffd2bf,
        transmission: 0.015,
        thickness: 0.55,
      });

      const lobeMaterial = tissueMaterial.clone();
      lobeMaterial.color.set(0xeab2a4);

      const ridgeMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xeeb7aa,
        roughness: 0.64,
        clearcoat: 0.18,
        sheen: 0.32,
        sheenColor: 0xffeee7,
      });

      const sulcusMaterial = new THREE.MeshPhysicalMaterial({
        color: 0x8b4f4d,
        roughness: 0.86,
        metalness: 0,
        transparent: true,
        opacity: 0.5,
      });

      const coreMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xa96463,
        roughness: 0.82,
        transparent: true,
        opacity: 0.56,
      });

      const sphereGeometry = new THREE.SphereGeometry(1, 64, 38);

      function addEllipsoid(group, position, scale, material, isInteractive = true) {
        const mesh = new THREE.Mesh(sphereGeometry, material);
        mesh.position.copy(position);
        mesh.scale.copy(scale);
        mesh.userData.region = "cortex";
        mesh.userData.title = "Cortex";
        mesh.userData.target = "Knowledge";
        group.add(mesh);
        if (isInteractive) {
          interactiveMeshes.push(mesh);
        }
        return mesh;
      }

      addEllipsoid(cortexGroup, new THREE.Vector3(-0.54, 0.03, 0.02), new THREE.Vector3(0.92, 0.8, 0.66), tissueMaterial);
      addEllipsoid(cortexGroup, new THREE.Vector3(0.54, 0.03, 0.02), new THREE.Vector3(0.92, 0.8, 0.66), tissueMaterial);
      addEllipsoid(cortexGroup, new THREE.Vector3(-1.02, -0.07, -0.05), new THREE.Vector3(0.48, 0.58, 0.5), lobeMaterial);
      addEllipsoid(cortexGroup, new THREE.Vector3(1.02, -0.07, -0.05), new THREE.Vector3(0.48, 0.58, 0.5), lobeMaterial);
      addEllipsoid(cortexGroup, new THREE.Vector3(-0.35, -0.58, -0.02), new THREE.Vector3(0.54, 0.32, 0.44), lobeMaterial);
      addEllipsoid(cortexGroup, new THREE.Vector3(0.35, -0.58, -0.02), new THREE.Vector3(0.54, 0.32, 0.44), lobeMaterial);

      addEllipsoid(coreGroup, new THREE.Vector3(0, -0.08, -0.18), new THREE.Vector3(0.8, 0.48, 0.42), coreMaterial, false);

      function frontSurfacePoint(side, xWithin, y, zLift = 0.08) {
        const centerX = side * 0.54;
        const rx = 0.92;
        const ry = 0.82;
        const rz = 0.66;
        const x = centerX + side * xWithin;
        const dx = (x - centerX) / rx;
        const dy = y / ry;
        const depth = Math.max(0.03, 1 - dx * dx - dy * dy);
        const z = rz * Math.sqrt(depth) + zLift;
        return new THREE.Vector3(x, y, z);
      }

      function addTube(points, radius, material, group = cortexGroup, region = "cortex") {
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 72, radius, 9, false);
        const mesh = new THREE.Mesh(geometry, material);
        mesh.userData.region = region;
        mesh.userData.title = "Cortex";
        mesh.userData.target = "Knowledge";
        group.add(mesh);
        if (region === "cortex") {
          interactiveMeshes.push(mesh);
        }
        return { mesh, curve };
      }

      for (const side of [-1, 1]) {
        for (let row = 0; row < 12; row += 1) {
          const y = -0.46 + row * 0.09;
          const points = [];
          for (let i = 0; i < 9; i += 1) {
            const t = i / 8;
            const xWithin = 0.04 + t * 0.82;
            const wave = Math.sin(t * Math.PI * 2.8 + row * 0.7) * 0.04;
            const rowDrift = Math.cos(t * Math.PI + row) * 0.025;
            points.push(frontSurfacePoint(side, xWithin, y + wave + rowDrift, 0.12));
          }
          addTube(points, 0.026, ridgeMaterial);
        }

        for (let row = 0; row < 8; row += 1) {
          const y = -0.34 + row * 0.095;
          const points = [];
          for (let i = 0; i < 8; i += 1) {
            const t = i / 7;
            const xWithin = 0.03 + t * 0.54;
            const fold = Math.sin(t * Math.PI * 3.4 + row * 1.2) * 0.028;
            points.push(frontSurfacePoint(side, xWithin + fold, y + Math.cos(t * Math.PI) * 0.018, 0.19));
          }
          addTube(points, 0.018, ridgeMaterial);
        }

        for (let col = 0; col < 8; col += 1) {
          const xWithin = 0.08 + col * 0.095;
          const points = [];
          for (let i = 0; i < 8; i += 1) {
            const t = i / 7;
            const y = -0.52 + t * 1.02;
            const drift = Math.sin(t * Math.PI * 2 + col * 0.8) * 0.035;
            points.push(frontSurfacePoint(side, xWithin + drift, y, 0.13));
          }
          addTube(points, 0.014, sulcusMaterial);
        }
      }

      addTube(
        [
          new THREE.Vector3(0, -0.63, 0.71),
          new THREE.Vector3(0.02, -0.32, 0.82),
          new THREE.Vector3(-0.015, 0.05, 0.87),
          new THREE.Vector3(0.02, 0.42, 0.78),
          new THREE.Vector3(0, 0.71, 0.56),
        ],
        0.022,
        sulcusMaterial
      );

      const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.07,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const glow = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 32), glowMaterial);
      glow.scale.set(2.2, 1.42, 0.3);
      glow.position.set(0, 0.02, 0.58);
      signalGroup.add(glow);

      const signalCurves = [];
      const lineMaterials = [
        new THREE.LineBasicMaterial({ color: 0x71f7ff, transparent: true, opacity: 0.44 }),
        new THREE.LineBasicMaterial({ color: 0xff88b3, transparent: true, opacity: 0.38 }),
        new THREE.LineBasicMaterial({ color: 0xffd86f, transparent: true, opacity: 0.36 }),
        new THREE.LineBasicMaterial({ color: 0x9cff7e, transparent: true, opacity: 0.34 }),
      ];

      function addSignalCurve(points, materialIndex) {
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(96));
        const line = new THREE.Line(geometry, lineMaterials[materialIndex % lineMaterials.length]);
        signalGroup.add(line);
        signalCurves.push(curve);
      }

      for (let i = 0; i < 9; i += 1) {
        const side = i % 2 === 0 ? -1 : 1;
        const y = -0.42 + i * 0.105;
        addSignalCurve(
          [
            frontSurfacePoint(side, 0.18, y - 0.1, 0.23),
            frontSurfacePoint(side, 0.44, y + 0.08, 0.32),
            frontSurfacePoint(-side, 0.28, y + 0.02, 0.34),
            frontSurfacePoint(-side, 0.68, y + 0.16, 0.24),
          ],
          i
        );
      }

      const particleGeometry = new THREE.SphereGeometry(0.026, 14, 10);
      const signalParticles = [];
      const focusPoint = new THREE.Vector3(0.56, 0.24, 1.12);

      for (let i = 0; i < 72; i += 1) {
        const material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(i / 72, 0.92, 0.64),
          transparent: true,
          opacity: 0.86,
          blending: THREE.NormalBlending,
          depthWrite: false,
          toneMapped: false,
        });
        const particle = new THREE.Mesh(particleGeometry, material);
        particle.userData.curveIndex = i % signalCurves.length;
        particle.userData.offset = i / 72;
        particle.userData.speed = 0.052 + (i % 7) * 0.008;
        particle.userData.phase = i * 0.37;
        signalGroup.add(particle);
        signalParticles.push(particle);
      }

      const pointer = new THREE.Vector2();
      const raycaster = new THREE.Raycaster();
      const desiredRotation = new THREE.Vector2(brainGroup.rotation.x, brainGroup.rotation.y);
      let isPointerDown = false;
      let dragMoved = false;
      let pendingRegion = null;
      let startX = 0;
      let startY = 0;
      let lastX = 0;
      let lastY = 0;

      function setPointerFromEvent(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
      }

      function hitTest(event) {
        setPointerFromEvent(event);
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(interactiveMeshes, false);
        return hits[0]?.object?.userData ?? null;
      }

      function setRegionLabel(region) {
        regionTitle.textContent = region?.title || "Cortex";
        regionTarget.textContent = region?.target || "Knowledge";
      }

      function selectRegion(regionName = "cortex") {
        selectedRegion = regionName;
        targetSelectionProgress = regionName === "cortex" ? 1 : 0;
        stage.dataset.region = selectedRegion;
        setRegionLabel({ title: "Cortex", target: "Knowledge" });
      }

      renderer.domElement.addEventListener("pointerdown", (event) => {
        isPointerDown = true;
        dragMoved = false;
        pendingRegion = hitTest(event)?.region || null;
        startX = event.clientX;
        startY = event.clientY;
        lastX = event.clientX;
        lastY = event.clientY;
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener("pointermove", (event) => {
        if (isPointerDown) {
          const dx = event.clientX - lastX;
          const dy = event.clientY - lastY;
          const totalDx = event.clientX - startX;
          const totalDy = event.clientY - startY;
          dragMoved = dragMoved || Math.hypot(totalDx, totalDy) > 5;
          desiredRotation.y += dx * 0.0068;
          desiredRotation.x += dy * 0.0032;
          desiredRotation.x = THREE.MathUtils.clamp(desiredRotation.x, -0.5, 0.35);
          lastX = event.clientX;
          lastY = event.clientY;
          return;
        }

        const hit = hitTest(event);
        hoveredRegion = hit?.region || null;
        renderer.domElement.style.cursor = hoveredRegion ? "pointer" : "grab";
        if (hit) {
          setRegionLabel(hit);
        }
      });

      renderer.domElement.addEventListener("pointerup", (event) => {
        if (!dragMoved && pendingRegion) {
          selectRegion(pendingRegion);
        }
        isPointerDown = false;
        pendingRegion = null;
        if (renderer.domElement.hasPointerCapture(event.pointerId)) {
          renderer.domElement.releasePointerCapture(event.pointerId);
        }
      });

      renderer.domElement.addEventListener("pointerleave", () => {
        hoveredRegion = null;
        renderer.domElement.style.cursor = "grab";
      });

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.position.z = width < 720 ? 8.5 : 7.2;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }

      window.addEventListener("resize", resize);
      resize();
      selectRegion("cortex");

      const clock = new THREE.Clock();

      function animate() {
        const elapsed = clock.getElapsedTime();
        const delta = clock.getDelta();
        const autoDrift = prefersReducedMotion || isPointerDown ? 0 : Math.sin(elapsed * 0.22) * 0.0018;

        desiredRotation.y += autoDrift;
        brainGroup.rotation.x = THREE.MathUtils.lerp(brainGroup.rotation.x, desiredRotation.x, 0.08);
        brainGroup.rotation.y = THREE.MathUtils.lerp(brainGroup.rotation.y, desiredRotation.y, 0.08);

        selectionProgress = THREE.MathUtils.lerp(selectionProgress, targetSelectionProgress, 0.08);
        const hoverLift = hoveredRegion === "cortex" ? 0.055 : 0;
        cortexGroup.position.z = THREE.MathUtils.lerp(cortexGroup.position.z, 0.28 * selectionProgress + hoverLift, 0.08);
        cortexGroup.scale.setScalar(1 + 0.035 * selectionProgress + (hoveredRegion ? 0.012 : 0));
        coreGroup.scale.setScalar(1 - 0.035 * selectionProgress);
        coreGroup.position.z = THREE.MathUtils.lerp(coreGroup.position.z, -0.1 * selectionProgress, 0.08);

        glow.material.opacity = 0.055 + Math.sin(elapsed * 1.7) * 0.018 + selectionProgress * 0.038;
        glow.scale.set(2.12 + selectionProgress * 0.08, 1.38 + selectionProgress * 0.06, 0.3);

        for (const particle of signalParticles) {
          const data = particle.userData;
          const curve = signalCurves[data.curveIndex];
          const t = (elapsed * data.speed + data.offset) % 1;
          const pathPoint = curve.getPoint(t);
          const pulse = (Math.sin(elapsed * 3.2 + data.phase) + 1) * 0.5;
          const target = pathPoint.clone().lerp(focusPoint, selectionProgress * (0.55 + pulse * 0.22));
          particle.position.copy(target);
          particle.scale.setScalar(0.86 + pulse * 0.6 + selectionProgress * 0.22);
          particle.material.color.setHSL((t + data.offset + elapsed * 0.04) % 1, 0.9, 0.56);
          particle.material.opacity = 0.62 + pulse * 0.24;
        }

        signalGroup.rotation.y = Math.sin(elapsed * 0.22) * 0.05;
        brainGroup.position.y = Math.sin(elapsed * 0.9) * 0.025;

        renderer.render(scene, camera);

        if (!prefersReducedMotion || delta < 1) {
          requestAnimationFrame(animate);
        }
      }

      animate();
    </script>
  </body>
</html>
