      function createChipMaterial(THREE, color, opacity, emissiveIntensity = 0.08) {
        const material = new THREE.MeshPhysicalMaterial({
          color,
          roughness: 0.38,
          metalness: 0.18,
          transparent: true,
          opacity,
          emissive: new THREE.Color(color),
          emissiveIntensity,
          clearcoat: 0.62,
          clearcoatRoughness: 0.2,
        });
        material.userData.baseOpacity = opacity;
        material.userData.baseEmissiveIntensity = emissiveIntensity;
        return material;
      }

      function createLightMaterial(THREE, color, opacity) {
        const material = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: true,
        });
        material.userData.baseOpacity = opacity;
        return material;
      }

      function setChipMaterialState(material, opacity, emissiveIntensity = null) {
        material.opacity = opacity;
        if (emissiveIntensity !== null && "emissiveIntensity" in material) {
          material.emissiveIntensity = emissiveIntensity;
        }
      }

      function createTraceSegment(THREE, from, to, width, material, name = "pcb-routing-channel") {
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const horizontal = Math.abs(dx) >= Math.abs(dy);
        const length = Math.max(Math.abs(horizontal ? dx : dy), 0.001);
        const geometry = new THREE.BoxGeometry(horizontal ? length : width, horizontal ? width : length, 0.018);
        const segment = new THREE.Mesh(geometry, material);
        segment.name = name;
        segment.position.set((from.x + to.x) / 2, (from.y + to.y) / 2, from.z);
        return segment;
      }

      function createRoutePath(THREE, route) {
        const path = new THREE.CurvePath();
        const points = route.map(([x, y, z]) => new THREE.Vector3(x, y, z));
        for (let index = 1; index < points.length; index += 1) {
          path.add(new THREE.LineCurve3(points[index - 1], points[index]));
        }
        return { path, points };
      }

      function addRoutedBusSegment(THREE, group, from, to, material) {
        group.add(createTraceSegment(THREE, from, to, 0.028, material, "pcb-routing-channel"));
      }

      function addDisplayConnectorFanout(THREE, group, endpoint, connectorSide, traceMaterial, viaMaterial, padMaterial) {
        const pinOffsets = DISPLAY_PIN_OFFSETS;
        const inward = connectorSide === "left" ? 1 : -1;
        const busStart = endpoint.clone().add(new THREE.Vector3(0, pinOffsets[0] - 0.026, 0));
        const busEnd = endpoint.clone().add(new THREE.Vector3(0, pinOffsets[pinOffsets.length - 1] + 0.026, 0));
        group.add(createTraceSegment(THREE, busStart, busEnd, 0.018, traceMaterial, "display-connector-bus"));

        const via = new THREE.Mesh(new THREE.TorusGeometry(0.036, 0.004, 8, 22), viaMaterial);
        via.name = "display-connector-via";
        via.position.copy(endpoint);
        group.add(via);

        pinOffsets.forEach((offset) => {
          const busPoint = endpoint.clone().add(new THREE.Vector3(0, offset, 0));
          const pinPoint = busPoint.clone().add(new THREE.Vector3(inward * 0.18, 0, 0));
          group.add(createTraceSegment(THREE, busPoint, pinPoint, 0.012, traceMaterial, "display-pin-fanout-trace"));

          const pad = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.024, 0.02), padMaterial);
          pad.name = "display-terminating-pad";
          pad.position.copy(pinPoint);
          group.add(pad);
        });
      }

      function createPcbRoutingChannel(THREE, module, layout) {
        const group = new THREE.Group();
        const color = new THREE.Color(module.color);
        const traceMaterial = createLightMaterial(THREE, color, 0.075);
        const viaMaterial = createLightMaterial(THREE, color, 0.13);
        const padMaterial = createLightMaterial(THREE, color, 0.16);
        const pulseMaterial = createLightMaterial(THREE, color, 0.62);
        const pulseGlowMaterial = createLightMaterial(THREE, color, 0.16);
        const { path, points } = createRoutePath(THREE, layout.route);

        group.name = `${module.id}-pcb-routing-channel`;
        group.userData.moduleId = module.id;
        group.userData.componentType = layout.component;

        for (let index = 1; index < points.length; index += 1) {
          addRoutedBusSegment(THREE, group, points[index - 1], points[index], traceMaterial);
        }

        points.slice(1, -1).forEach((point) => {
          const via = new THREE.Mesh(new THREE.TorusGeometry(0.034, 0.0045, 8, 22), viaMaterial);
          via.name = "pcb-routing-via";
          via.position.copy(point);
          group.add(via);
        });

        const endpoint = points[points.length - 1];
        const pad = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.022), padMaterial);
        pad.name = "pcb-routing-pad";
        pad.position.copy(endpoint);
        group.add(pad);
        addDisplayConnectorFanout(THREE, group, endpoint, layout.connectorSide, traceMaterial, viaMaterial, padMaterial);

        const pulse = new THREE.Group();
        pulse.name = "chip-signal-pulse";
        const glow = new THREE.Mesh(new THREE.SphereGeometry(0.054, 16, 10), pulseGlowMaterial);
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.017, 12, 8), pulseMaterial);
        pulse.add(glow, core);
        pulse.visible = false;
        group.add(pulse);

        return {
          group,
          path,
          pulse,
          materials: [traceMaterial, viaMaterial, padMaterial],
          pulseMaterials: [pulseMaterial, pulseGlowMaterial],
          phase: (CHIP_LAYOUT.findIndex((candidate) => candidate.id === module.id) * 0.17) % 1,
          speed: 0.08 + (CHIP_LAYOUT.findIndex((candidate) => candidate.id === module.id) % 3) * 0.018,
        };
      }

      function addComponentBox(THREE, group, material, x, y, width, height, depth = 0.036, rotation = 0) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
        mesh.position.set(x, y, 0.04);
        mesh.rotation.z = rotation;
        group.add(mesh);
        return mesh;
      }

      function getModuleColorCss(module) {
        return `#${module.color.toString(16).padStart(6, "0")}`;
      }

      function drawWrappedDisplayLine(context, text, x, y, maxWidth, lineHeight, maxLines) {
        const words = text.split(" ");
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const nextLine = line ? `${line} ${word}` : word;
          if (context.measureText(nextLine).width <= maxWidth || !line) {
            line = nextLine;
          } else {
            lines.push(line);
            line = word;
          }
        });
        if (line) {
          lines.push(line);
        }
        lines.slice(0, maxLines).forEach((wrappedLine, index) => {
          const finalLine = index === maxLines - 1 && lines.length > maxLines ? `${wrappedLine.replace(/\.$/, "")}...` : wrappedLine;
          context.fillText(finalLine, x, y + index * lineHeight);
        });
      }

      function fitDisplayFont(context, text, weight, preferredSize, minSize, maxWidth) {
        let size = preferredSize;
        do {
          context.font = `${weight} ${size}px Inter, Arial, sans-serif`;
          if (context.measureText(text).width <= maxWidth) return size;
          size -= 1;
        } while (size >= minSize);
        context.font = `${weight} ${minSize}px Inter, Arial, sans-serif`;
        return minSize;
      }

      function getSelectedDisplayCharacterCount(module) {
        return module.region.length + module.folder.length + module.sentence.length;
      }

      function sliceDisplayText(text, revealCharacters) {
        if (!Number.isFinite(revealCharacters)) return text;
        return text.slice(0, clamp(Math.floor(revealCharacters), 0, text.length));
      }

      function paintDisplayTexture(display, module, mode, revealCharacters = Infinity) {
        const { canvas, texture } = display;
        const context = canvas.getContext("2d");
        const accent = getModuleColorCss(module);
        const selectedReveal = mode === "selected" ? revealCharacters : Infinity;
        context.clearRect(0, 0, canvas.width, canvas.height);

        const active = mode !== "idle";
        const selected = mode === "selected";
        context.fillStyle = active ? "rgba(5, 15, 22, 0.96)" : "rgba(3, 9, 13, 0.92)";
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.strokeStyle = active ? "rgba(130, 246, 255, 0.22)" : "rgba(130, 246, 255, 0.09)";
        context.lineWidth = 2;
        for (let y = 22; y < canvas.height; y += 28) {
          context.beginPath();
          context.moveTo(22, y);
          context.lineTo(canvas.width - 22, y);
          context.stroke();
        }

        context.fillStyle = accent;
        context.globalAlpha = selected ? 0.9 : active ? 0.58 : 0.22;
        context.fillRect(24, 24, 10, canvas.height - 48);
        context.globalAlpha = 1;

        context.fillStyle = selected ? "rgba(248, 254, 255, 0.94)" : active ? "rgba(238, 252, 255, 0.82)" : "rgba(238, 252, 255, 0.32)";
        context.textBaseline = "top";

        if (selected) {
          const regionReveal = selectedReveal;
          const folderReveal = selectedReveal - module.region.length;
          const sentenceReveal = folderReveal - module.folder.length;
          const regionText = sliceDisplayText(module.region, regionReveal);
          const folderText = sliceDisplayText(module.folder, folderReveal);
          const sentenceText = sliceDisplayText(module.sentence, sentenceReveal);
          const typing = selectedReveal < getSelectedDisplayCharacterCount(module);
          fitDisplayFont(context, module.region, "760", 54, 38, canvas.width - 94);
          context.fillText(regionText, 56, 36);
          context.font = "680 40px Inter, Arial, sans-serif";
          context.fillStyle = accent;
          context.fillText(folderText, 56, 108);
          context.font = "560 35px Inter, Arial, sans-serif";
          context.fillStyle = "rgba(231, 245, 248, 0.86)";
          drawWrappedDisplayLine(context, sentenceText, 56, 164, canvas.width - 92, 44, 3);
          if (typing) {
            context.fillStyle = accent;
            context.globalAlpha = 0.74 + Math.sin(performance.now() * 0.012) * 0.18;
            context.fillRect(56 + Math.min(context.measureText(sentenceText).width, canvas.width - 130), 304, 18, 7);
            context.globalAlpha = 1;
          }
        } else if (active) {
          context.font = "760 48px Inter, Arial, sans-serif";
          context.fillText(module.folder, 56, 66);
          fitDisplayFont(context, module.region.replace(" Region", ""), "560", 31, 24, canvas.width - 94);
          context.fillStyle = "rgba(231, 245, 248, 0.7)";
          context.fillText(module.region.replace(" Region", ""), 56, 140);
        } else {
          context.font = "680 31px Inter, Arial, sans-serif";
          context.fillText(module.folder, 56, 78);
          context.font = "560 25px Inter, Arial, sans-serif";
          context.fillStyle = "rgba(231, 245, 248, 0.3)";
          context.fillText("STANDBY", 56, 132);
        }

        context.strokeStyle = selected ? accent : "rgba(133, 247, 255, 0.28)";
        context.lineWidth = selected ? 5 : 3;
        context.strokeRect(16, 16, canvas.width - 32, canvas.height - 32);
        texture.needsUpdate = true;
      }

      function createDisplayTexture(THREE, module) {
        const canvas = document.createElement("canvas");
        canvas.width = 768;
        canvas.height = 360;
        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = 4;
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          opacity: 0.46,
          depthWrite: false,
          depthTest: true,
        });
        material.userData.baseOpacity = 0.46;
        const display = { canvas, texture, material, mode: "", lastPaintKey: "", revealStartedAt: 0 };
        paintDisplayTexture(display, module, "idle");
        return display;
      }

      function setDisplayModuleState(component, module, expanded, selected, dimmed, time = 0) {
        const mode = selected ? "selected" : expanded ? "expanded" : "idle";
        const display = component.userData.display;
        if (display) {
          const enteringSelected = display.mode !== "selected" && mode === "selected";
          if (enteringSelected) {
            display.revealStartedAt = time;
          }
          const selectedCharacters = getSelectedDisplayCharacterCount(module);
          const revealCharacters = mode === "selected"
            ? prefersReducedMotion
              ? selectedCharacters
              : Math.min(selectedCharacters, Math.max(0, (time - display.revealStartedAt) * DISPLAY_TYPEWRITER_CHARS_PER_SECOND))
            : Infinity;
          const paintKey = `${mode}:${Math.floor(revealCharacters)}`;
          if (display.mode !== mode || display.lastPaintKey !== paintKey) {
            paintDisplayTexture(display, module, mode, revealCharacters);
            display.lastPaintKey = paintKey;
          }
          display.mode = mode;
        }
        if (display?.material) {
          const targetOpacity = selected ? 0.94 : expanded ? 0.68 : 0.34;
          display.material.opacity = targetOpacity * (dimmed ? 0.46 : 1);
        }
      }

      function createChipModuleComponent(THREE, module, layout) {
        const group = new THREE.Group();
        const color = new THREE.Color(module.color);
        const baseMaterial = createChipMaterial(THREE, 0x101a24, 0.68, 0.035);
        const bezelMaterial = createChipMaterial(THREE, 0x1a2733, 0.72, 0.045);
        const screenMaterial = createChipMaterial(THREE, color, 0.2, 0.18);
        const pinMaterial = createLightMaterial(THREE, color, 0.28);
        const edgeMaterial = createLightMaterial(THREE, color, 0.18);
        const display = createDisplayTexture(THREE, module);
        const moduleScale = layout.scale ?? CHIP_DISPLAY_MODULE_SCALE;
        const pinX = layout.connectorSide === "left" ? -0.7 : 0.7;

        group.name = `${module.id}-chip-display-module`;
        group.userData.moduleId = module.id;
        group.userData.componentType = layout.component;
        group.userData.moduleUrl = getModuleHomepageUrl(module);

        const body = addComponentBox(THREE, group, baseMaterial, 0, 0, 1.18, 0.68, 0.052);
        const bezel = addComponentBox(THREE, group, bezelMaterial, 0, 0, 1.04, 0.54, 0.058);
        const glass = addComponentBox(THREE, group, screenMaterial, 0, 0, 0.94, 0.44, 0.062);
        body.name = "project-display-module-body";
        bezel.name = "project-display-module-bezel";
        glass.name = "project-display-screen";

        const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.88, 0.395), display.material);
        textPlane.name = "project-display-screen-text";
        textPlane.position.set(0, 0, 0.088);
        group.add(textPlane);

        DISPLAY_PIN_OFFSETS.forEach((y) => {
          const pin = addComponentBox(THREE, group, pinMaterial, pinX, y / moduleScale, 0.07, 0.024, 0.018);
          pin.name = "display-module-pin";
        });

        const edge = new THREE.Mesh(new THREE.BoxGeometry(1.24, 0.74, 0.012), edgeMaterial);
        edge.name = "project-display-edge-glow";
        edge.position.z = 0.032;
        group.add(edge);

        group.userData.display = display;
        group.userData.setDisplayState = (expanded, selected, dimmed, time) => {
          setDisplayModuleState(group, module, expanded, selected, dimmed, time);
        };
        group.userData.materials = [baseMaterial, bezelMaterial, screenMaterial, pinMaterial, edgeMaterial];
        return group;
      }

      function createInductionField(THREE) {
        const group = new THREE.Group();
        const materials = [];

        group.name = "induction-field";
        for (let index = 0; index < 3; index += 1) {
          const material = createLightMaterial(THREE, index === 1 ? 0xff7be8 : 0x5ef5ff, 0.035);
          const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28 + index * 0.24, 0.006, 8, 74), material);
          ring.name = "induction-field-ring";
          ring.position.set(0, 0.42 + index * 0.18, 0.07);
          ring.scale.y = 0.24;
          group.add(ring);
          materials.push(material);
        }

        const columnMaterial = createLightMaterial(THREE, 0x80f5ff, 0.028);
        const column = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.3, 0.92, 36, 1, true), columnMaterial);
        column.name = "induction-field-column";
        column.position.set(0, 0.42, 0.04);
        group.add(column);
        materials.push(columnMaterial);

        group.userData.materials = materials;
        return group;
      }

      function createGpuChipPedestal(THREE) {
        const group = new THREE.Group();
        const state = { active: 0 };
        const backgroundBoardMaterial = createChipMaterial(THREE, 0x081922, 0.34, 0.018);
        const boardMaterial = createChipMaterial(THREE, 0x111923, 0.72, 0.025);
        const boardEdgeMaterial = createLightMaterial(THREE, 0x74efff, 0.09);
        const coreMaterial = createChipMaterial(THREE, 0x1b2b3a, 0.66, 0.08);
        const coreLightMaterial = createLightMaterial(THREE, 0x73f6ff, 0.18);
        const backgroundBoard = new THREE.Mesh(new THREE.BoxGeometry(10.8, 6.3, 0.035), backgroundBoardMaterial);
        const board = new THREE.Mesh(new THREE.BoxGeometry(3.72, 1.24, 0.075), boardMaterial);
        const boardEdge = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.02, 0.018), boardEdgeMaterial);
        const computeCore = new THREE.Group();
        const inductionField = createInductionField(THREE);

        group.name = "gpu-chip-pedestal";
        backgroundBoard.name = "gpu-chip-background-substrate";
        backgroundBoard.position.set(0, 0, -0.035);
        board.name = "gpu-chip-substrate";
        boardEdge.name = "gpu-chip-edge-glow";
        board.position.y = -1.56;
        boardEdge.position.set(0, -1.56, 0.048);
        computeCore.name = "compute-pedestal-core";
        computeCore.position.y = -1.56;
        inductionField.position.y = -1.56;

        const coreBase = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.32, 0.058), coreMaterial);
        const coreInset = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.16, 0.066), coreLightMaterial);
        coreBase.name = "compute-pedestal-core-base";
        coreInset.name = "compute-pedestal-core-light";
        coreBase.position.z = 0.08;
        coreInset.position.z = 0.12;
        computeCore.add(coreBase, coreInset);

        group.add(backgroundBoard, board, boardEdge, computeCore, inductionField);

        const channels = CHIP_LAYOUT.map((layout) => {
          const module = MODULES.find((candidate) => candidate.id === layout.id);
          const route = createPcbRoutingChannel(THREE, module, layout);
          const component = createChipModuleComponent(THREE, module, layout);
          component.position.set(...layout.position);
          component.userData.baseScale = layout.scale ?? CHIP_DISPLAY_MODULE_SCALE;
          component.scale.setScalar(component.userData.baseScale);
          group.add(route.group, component);
          return { module, route, component };
        });

        const allCoreMaterials = [boardEdgeMaterial, coreLightMaterial, ...inductionField.userData.materials];
        const backgroundMaterials = [backgroundBoardMaterial];

        return {
          group,
          getDisplayTargets() {
            return channels.map((entry) => entry.component);
          },
          resize() {
            const mobile = window.innerWidth < 720;
            group.position.set(0, mobile ? -0.14 : -0.08, -1.48);
            group.scale.setScalar(mobile ? 0.72 : 1.02);
            group.rotation.x = mobile ? -0.01 : -0.018;
          },
          update(time, interactionState) {
            const expanded = Boolean(interactionState?.expanded);
            const selected = interactionState?.selected ?? null;
            const target = expanded ? 1 : 0;
            state.active += (target - state.active) * (prefersReducedMotion ? 1 : 0.075);
            const eased = state.active * state.active * (3 - 2 * state.active);

            setChipMaterialState(boardMaterial, 0.62 + eased * 0.12, 0.025 + eased * 0.025);
            setChipMaterialState(backgroundBoardMaterial, 0.3 + eased * 0.1, 0.016 + eased * 0.016);
            backgroundMaterials.slice(1).forEach((material) => {
              setChipMaterialState(material, (material.userData.baseOpacity ?? 0.03) * (1 + eased * 1.3));
            });
            allCoreMaterials.forEach((material) => {
              setChipMaterialState(material, (material.userData.baseOpacity ?? 0.08) * (1 + eased * 2.1));
            });
            computeCore.scale.setScalar(1 + eased * 0.06 + (selected ? 0.03 : 0));

            channels.forEach((entry, index) => {
              const selectedFocus = !selected || selected === entry.module.id ? 1 : 0.22;
              const routeOpacity = (0.08 + eased * (selected === entry.module.id ? 0.55 : 0.22)) * selectedFocus;
              const componentOpacity = (0.26 + eased * (selected === entry.module.id ? 0.46 : 0.2)) * selectedFocus;
              const componentGlow = 0.08 + eased * (selected === entry.module.id ? 0.34 : 0.12);
              entry.component.userData.setDisplayState?.(
                expanded,
                selected === entry.module.id,
                Boolean(selected && selected !== entry.module.id),
                time,
              );

              entry.route.materials.forEach((material) => {
                setChipMaterialState(material, routeOpacity * (material.userData.baseOpacity ?? 0.1) * 7.2);
              });
              entry.component.userData.materials.forEach((material) => {
                setChipMaterialState(
                  material,
                  componentOpacity * (material.userData.baseOpacity ?? 0.35) * 1.8,
                  componentGlow,
                );
              });

              const baseScale = entry.component.userData.baseScale ?? 1;
              entry.component.scale.setScalar(baseScale * (1 + eased * (selected === entry.module.id ? 0.18 : 0.03)));
              entry.route.pulse.visible = eased > 0.05 && (!selected || selected === entry.module.id);
              if (entry.route.pulse.visible) {
                const t = prefersReducedMotion ? entry.route.phase : (entry.route.phase + time * entry.route.speed) % 1;
                const point = entry.route.path.getPointAt(t);
                const shimmer = 0.74 + Math.sin(time * 5.2 + index * 1.1) * 0.2;
                entry.route.pulse.position.copy(point);
                entry.route.pulse.scale.setScalar(0.75 + shimmer * 0.24);
                entry.route.pulseMaterials.forEach((material, materialIndex) => {
                  const base = materialIndex === 0 ? 0.54 : 0.13;
                  setChipMaterialState(material, base * shimmer * eased * selectedFocus);
                });
              }
            });
          },
        };
      }

      function createScene(THREE) {
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x07080b, 0.038);

        const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0.2, 6.7);

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
          powerPreference: "high-performance",
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.08;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        host.appendChild(renderer.domElement);

        const ambient = new THREE.HemisphereLight(0xdffbff, 0x101525, 1.25);
        const key = new THREE.DirectionalLight(0xe7fbff, 3.35);
        key.position.set(-3.8, 4.5, 4.4);
        key.castShadow = true;
        key.shadow.mapSize.width = 1024;
        key.shadow.mapSize.height = 1024;

        const rim = new THREE.DirectionalLight(0x76eaff, 2.15);
        rim.position.set(4.2, 2.1, -3.4);

        const fill = new THREE.PointLight(0xff72d0, 1.65, 8);
        fill.position.set(0, -1.8, 3.8);

        const warmEdge = new THREE.PointLight(0xffd277, 1.05, 7);
        warmEdge.position.set(-2.4, 0.8, 2.5);
        scene.add(ambient, key, rim, fill, warmEdge);

        const brain = new THREE.Group();
        brain.name = "brain-control-root";
        scene.add(brain);

        const shellGeometry = new THREE.SphereGeometry(2.34, 80, 40);
        const shellMaterial = new THREE.MeshBasicMaterial({
          color: 0xbdefff,
          transparent: true,
          opacity: 0.06,
          depthWrite: false,
          side: THREE.BackSide,
        });
        const shell = new THREE.Mesh(shellGeometry, shellMaterial);
        shell.scale.set(1.28, 0.82, 0.9);
        shell.position.set(0, 0.02, -0.04);
        scene.add(shell);

        return { scene, camera, renderer, brain, shell };
      }

      function findDisplayModuleFromObject(object) {
        let current = object;
        while (current) {
          if (current.userData?.componentType === "project-display" && current.userData?.moduleUrl) {
            return current;
          }
          current = current.parent;
        }
        return null;
      }

      function setupControls(
        view,
        onBrainTap,
        getInteractionState = () => ({ expanded: false }),
        displayTargets = [],
        onDisplayTap = null,
      ) {
        const rotation = {
          x: view.brain.rotation.x,
          y: view.brain.rotation.y,
          targetX: view.brain.rotation.x,
          targetY: view.brain.rotation.y,
        };
        let cameraZ = view.camera.position.z;
        let targetCameraZ = cameraZ;
        let dragging = false;
        let previousX = 0;
        let previousY = 0;
        let dragDistance = 0;

        const canvas = view.renderer.domElement;
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function pickDisplayModule(event) {
          if (!getInteractionState().expanded || displayTargets.length === 0) return null;
          const rect = canvas.getBoundingClientRect();
          pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
          pointer.y = -(((event.clientY - rect.top) / rect.height) * 2 - 1);
          raycaster.setFromCamera(pointer, view.camera);
          const hits = raycaster.intersectObjects(displayTargets, true);
          if (hits.length === 0) return null;
          return findDisplayModuleFromObject(hits[0].object);
        }

        canvas.addEventListener("pointerdown", (event) => {
          dragging = true;
          previousX = event.clientX;
          previousY = event.clientY;
          dragDistance = 0;
          canvas.style.cursor = "grabbing";
          canvas.setPointerCapture(event.pointerId);
        });

        canvas.addEventListener("pointermove", (event) => {
          if (!dragging) {
            canvas.style.cursor = pickDisplayModule(event) ? "pointer" : "grab";
            return;
          }
          const dx = event.clientX - previousX;
          const dy = event.clientY - previousY;
          previousX = event.clientX;
          previousY = event.clientY;
          dragDistance += Math.abs(dx) + Math.abs(dy);
          rotation.targetY += dx * 0.006;
          rotation.targetX = clamp(rotation.targetX + dy * 0.0045, -0.72, 0.48);
        });

        canvas.addEventListener("pointerup", (event) => {
          dragging = false;
          if (canvas.hasPointerCapture(event.pointerId)) {
            canvas.releasePointerCapture(event.pointerId);
          }
          if (dragDistance < 9) {
            const displayModule = pickDisplayModule(event);
            if (displayModule) {
              onDisplayTap?.(displayModule);
              canvas.style.cursor = "pointer";
              return;
            }
            onBrainTap?.();
          }
          canvas.style.cursor = pickDisplayModule(event) ? "pointer" : "grab";
        });

        canvas.addEventListener("pointercancel", () => {
          dragging = false;
          canvas.style.cursor = "grab";
        });

        canvas.addEventListener(
          "wheel",
          (event) => {
            event.preventDefault();
            targetCameraZ = clamp(targetCameraZ + event.deltaY * 0.004, 4.8, 8.2);
          },
          { passive: false },
        );

        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape" || event.key.toLowerCase() === "r") {
            rotation.targetX = INITIAL_ROTATION.x;
            rotation.targetY = INITIAL_ROTATION.y;
            targetCameraZ = window.innerWidth < 720 ? 7.8 : 6.7;
          }
        });

        return {
          update() {
            if (!prefersReducedMotion && !dragging && !getInteractionState().expanded) {
              rotation.targetY += 0.0012;
            }
            rotation.x += (rotation.targetX - rotation.x) * 0.09;
            rotation.y += (rotation.targetY - rotation.y) * 0.09;
            cameraZ += (targetCameraZ - cameraZ) * 0.08;
            view.brain.rotation.x = rotation.x;
            view.brain.rotation.y = rotation.y;
            view.camera.position.z = cameraZ;
          },
          resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mobile = width < 720;
            view.camera.aspect = width / height;
            view.camera.position.z = mobile ? 7.8 : 6.7;
            targetCameraZ = view.camera.position.z;
            cameraZ = view.camera.position.z;
            view.camera.updateProjectionMatrix();
            view.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            view.renderer.setSize(width, height);
            view.brain.scale.setScalar(mobile ? 0.78 : 1.16);
            view.brain.position.y = mobile ? -0.18 : -0.12;
            view.shell.scale.set(mobile ? 1.07 : 1.28, mobile ? 0.72 : 0.82, mobile ? 0.76 : 0.9);
          },
        };
      }

      async function boot() {
        if (forceFallback) {
          const fallbackUi = setupModuleUi(null);
          fallbackUi.toggleExpanded();
          activateFallback();
          return;
        }

        try {
          const view = createScene(THREE);
          const brainModel = await loadBrainModel();
          const activityFlow = createSulcalActivityFlow(THREE, brainModel);
          const explodedView = createExplodedResearchModules(THREE, brainModel);
          const gpuPedestal = createGpuChipPedestal(THREE);
          const moduleUi = setupModuleUi(explodedView);
          view.brain.clear();
          view.scene.add(gpuPedestal.group);
          view.brain.add(brainModel, activityFlow, explodedView.group);
          const controls = setupControls(
            view,
            moduleUi.toggleExpanded,
            moduleUi.getState,
            gpuPedestal.getDisplayTargets(),
            (moduleTarget) => {
              window.location.assign(moduleTarget.userData.moduleUrl);
            },
          );
          controls.resize();
          gpuPedestal.resize();
          document.body.classList.add("webgl-ready");
          document.body.classList.remove("fallback-active");

          const clock = new THREE.Clock();

          function render() {
            const elapsed = clock.getElapsedTime();
            controls.update();
            activityFlow.userData.update(elapsed);
            explodedView.update(elapsed, view.brain, activityFlow);
            gpuPedestal.update(elapsed, moduleUi.getState());
            view.shell.rotation.y += prefersReducedMotion ? 0 : 0.0007;
            view.renderer.render(view.scene, view.camera);
            app = requestAnimationFrame(render);
          }

          window.addEventListener("resize", () => {
            controls.resize();
            gpuPedestal.resize();
          });
          render();
        } catch (error) {
          console.warn("3D brain model unavailable; fallback brain displayed.", error);
          if (app) cancelAnimationFrame(app);
          activateFallback();
        }
      }

      boot();
    </script>
  </body>
</html>
