  <head>

    <style>
      :root {
        color-scheme: dark;
        --ink: #fff8f2;
        --grid: rgba(255, 255, 255, 0.032);
        --edge: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 50% 48%, rgba(92, 238, 255, 0.16), transparent 30%),
          radial-gradient(circle at 76% 38%, rgba(255, 119, 214, 0.08), transparent 34%),
          radial-gradient(circle at 24% 68%, rgba(255, 210, 112, 0.07), transparent 32%),
          linear-gradient(90deg, transparent 0 11.5%, rgba(118, 240, 255, 0.05) 11.5% 11.8%, transparent 11.8% 27%),
          linear-gradient(0deg, transparent 0 13%, rgba(118, 240, 255, 0.042) 13% 13.28%, transparent 13.28% 31%),
          linear-gradient(145deg, #071319 0%, #0a1820 46%, #071018 100%);
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        content: "";
        pointer-events: none;
      }

      body::before {
        background:
          radial-gradient(circle at 12% 68%, rgba(255, 211, 90, 0.13) 0 2px, transparent 3px),
          radial-gradient(circle at 84% 74%, rgba(255, 123, 232, 0.12) 0 2px, transparent 3px),
          radial-gradient(circle at 28% 40%, rgba(94, 245, 255, 0.11) 0 2px, transparent 3px),
          radial-gradient(circle at 72% 28%, rgba(143, 140, 255, 0.1) 0 2px, transparent 3px),
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size:
          420px 280px,
          460px 300px,
          380px 260px,
          440px 320px,
          68px 68px,
          68px 68px;
        mask-image: linear-gradient(to bottom, transparent 0%, black 16%, black 82%, transparent 100%);
      }

      body::after {
        z-index: 4;
        background:
          linear-gradient(to bottom, rgba(1, 10, 14, 0.12), transparent 24%, transparent 76%, rgba(1, 10, 14, 0.36)),
          linear-gradient(90deg, rgba(1, 10, 14, 0.28), transparent 22%, transparent 78%, rgba(1, 10, 14, 0.28));
      }

      [hidden] {
        display: none !important;
      }

      #brain-stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        isolation: isolate;
        touch-action: none;
      }

      .title-plane {
        position: absolute;
        top: clamp(24px, 6vh, 58px);
        left: 50%;
        z-index: 3;
        width: min(92vw, 1100px);
        transform: translateX(-50%);
        pointer-events: none;
        text-align: center;
      }

      h1 {
        margin: 0;
        white-space: nowrap;
        font-size: clamp(2.05rem, 6.15vw, 6.35rem);
        font-weight: 760;
        line-height: 0.96;
        letter-spacing: 0;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.28),
          0 18px 62px rgba(0, 0, 0, 0.72),
          0 0 34px rgba(112, 199, 226, 0.22);
      }

      .title-rule {
        position: absolute;
        top: calc(clamp(24px, 6vh, 58px) + clamp(2.8rem, 6.25vw, 6.7rem));
        left: 50%;
        z-index: 3;
        width: min(54vw, 700px);
        height: 1px;
        transform: translateX(-50%);
        pointer-events: none;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.58), transparent);
        box-shadow: 0 0 28px rgba(112, 199, 226, 0.22);
      }

      #brain-canvas-host,
      #fallback-brain {
        position: absolute;
        inset: 0;
      }

      #brain-canvas-host {
        z-index: 1;
      }

      #brain-canvas-host canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        cursor: grab;
        outline: none;
      }

      #brain-canvas-host canvas:active {
        cursor: grabbing;
      }

      #fallback-brain {
        z-index: 1;
        width: 100%;
        height: 100%;
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease;
      }

      body.webgl-ready #fallback-brain {
        opacity: 0;
        pointer-events: none;
      }

      body.fallback-active #fallback-brain {
        opacity: 1;
        pointer-events: none;
      }

      .module-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .module-label {
        position: absolute;
        left: var(--x);
        top: var(--y);
        display: grid;
        gap: 2px;
        min-width: 138px;
        min-height: 44px;
        padding: 9px 11px;
        transform: translate(-50%, -50%) translateY(8px);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045)),
          rgba(7, 10, 14, 0.42);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 18px 48px rgba(0, 0, 0, 0.36),
          0 0 28px color-mix(in srgb, var(--module-color), transparent 55%);
        opacity: 0;
        pointer-events: none;
        cursor: pointer;
        backdrop-filter: blur(18px) saturate(1.2);
        transition:
          opacity 220ms ease,
          transform 220ms ease,
          border-color 220ms ease,
          background 220ms ease;
      }

      body.brain-expanded .module-label {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -50%);
      }

      .module-label::before {
        position: absolute;
        left: 10px;
        top: 50%;
        width: 5px;
        height: 38px;
        content: "";
        transform: translateY(-50%);
        border-radius: 999px;
        background: var(--module-color);
        box-shadow: 0 0 18px var(--module-color);
      }

      .module-label strong,
      .module-label span {
        display: block;
        padding-left: 12px;
        text-align: left;
        white-space: nowrap;
      }

      .module-label strong {
        font-size: 0.84rem;
        font-weight: 760;
        line-height: 1.1;
      }

      .module-label span {
        color: rgba(255, 248, 242, 0.64);
        font-size: 0.68rem;
        font-weight: 520;
        line-height: 1.15;
      }

      .module-label:hover,
      .module-label:focus-visible,
      .module-label[aria-pressed="true"] {
        border-color: color-mix(in srgb, var(--module-color), white 32%);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--module-color), transparent 78%), rgba(255, 255, 255, 0.065)),
          rgba(7, 10, 14, 0.56);
        outline: none;
        transform: translate(-50%, -50%) scale(1.035);
      }

      .module-panel {
        position: absolute;
        left: 50%;
        bottom: clamp(20px, 4.5vh, 44px);
        z-index: 5;
        display: none;
        gap: 3px;
        min-width: min(430px, calc(100vw - 32px));
        padding: 12px 16px 13px;
        transform: translateX(-50%) translateY(12px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
          rgba(4, 7, 11, 0.5);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          0 22px 58px rgba(0, 0, 0, 0.42);
        opacity: 0;
        pointer-events: none;
        backdrop-filter: blur(20px) saturate(1.25);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }

      .module-panel strong,
      .module-panel span,
      .module-panel a {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .module-panel strong {
        font-size: 0.98rem;
        font-weight: 760;
        line-height: 1.15;
      }

      .module-panel span,
      .module-panel a {
        color: rgba(255, 248, 242, 0.68);
        font-size: 0.76rem;
        line-height: 1.2;
      }

      .module-panel a {
        pointer-events: auto;
        text-decoration: none;
      }

      .module-panel a:hover,
      .module-panel a:focus-visible {
        color: var(--ink);
        text-decoration: underline;
        text-underline-offset: 3px;
        outline: none;
      }

      @media (max-width: 720px) {
        .title-plane {
          top: 30px;
          width: 96vw;
        }

        h1 {
          font-size: clamp(1.82rem, 8.7vw, 3.28rem);
        }

        .title-rule {
          top: 82px;
          width: 78vw;
        }

        .module-label {
          min-width: 118px;
          padding: 8px 9px;
        }

        .module-label strong {
          font-size: 0.74rem;
        }

        .module-label span {
          font-size: 0.58rem;
        }

        .module-panel {
          bottom: 16px;
          padding: 10px 12px 11px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }

      function activateFallback() {

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function createFoldedGeometry(THREE, detail = 88, amount = 0.026) {
        const geometry = new THREE.SphereGeometry(1, detail, Math.floor(detail / 2));
        const position = geometry.attributes.position;
        const vector = new THREE.Vector3();

        for (let index = 0; index < position.count; index += 1) {
          vector.fromBufferAttribute(position, index);
          const normal = vector.clone().normalize();
          const fold =
            Math.sin(normal.x * 18 + normal.z * 7) * 0.52 +
            Math.sin(normal.y * 22 - normal.z * 10) * 0.34 +
            Math.sin((normal.x + normal.y) * 27) * 0.18;
          const scale = 1 + fold * amount;
          position.setXYZ(index, vector.x * scale, vector.y * scale, vector.z * scale);
        }

        geometry.computeVertexNormals();
        return geometry;
      }

      function createMaterial(THREE, color, roughness = 0.7) {
        return new THREE.MeshPhysicalMaterial({
          color,
          roughness,
          metalness: 0,
          clearcoat: 0.08,
          clearcoatRoughness: 0.82,
          sheen: 0.34,
          sheenColor: new THREE.Color(0xffd9cc),
        });
      }

      function createEllipsoid(THREE, geometry, material, position, scale, rotation = [0, 0, 0]) {
        const mesh = new THREE.Mesh(geometry.clone(), material);
        mesh.position.set(...position);
        mesh.scale.set(...scale);
        mesh.rotation.set(...rotation);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
      }

      function createHemisphere(THREE, side) {
        const group = new THREE.Group();
        const folded = createFoldedGeometry(THREE);
        const tissue = createMaterial(THREE, side < 0 ? 0xdfaa98 : 0xd89c8e);
        const upperTissue = createMaterial(THREE, 0xf0bca9, 0.76);

        group.add(
          createEllipsoid(THREE, folded, tissue, [side * 0.48, 0.12, 0], [0.78, 0.66, 1.16], [0, side * 0.08, 0]),
          createEllipsoid(THREE, folded, upperTissue, [side * 0.5, 0.36, 0.36], [0.72, 0.48, 0.8], [0.08, side * 0.12, 0]),
          createEllipsoid(THREE, folded, tissue, [side * 0.52, 0.22, 0.92], [0.66, 0.5, 0.58], [0.05, side * -0.16, 0]),
          createEllipsoid(THREE, folded, tissue, [side * 0.55, 0.08, -0.86], [0.62, 0.5, 0.62], [0, side * 0.12, 0]),
          createEllipsoid(THREE, folded, tissue, [side * 0.54, -0.34, 0.12], [0.58, 0.34, 0.78], [0.08, side * 0.08, side * 0.02]),
        );

        return group;
      }

      function createCerebellum(THREE) {
        const group = new THREE.Group();
        const geometry = createFoldedGeometry(THREE, 72, 0.026);
        const material = createMaterial(THREE, 0xa46b60, 0.82);
        const body = createEllipsoid(THREE, geometry, material, [0, -0.58, -1.0], [0.82, 0.32, 0.48], [0.04, 0, 0]);
        group.add(body);

        const grooveMaterial = new THREE.MeshStandardMaterial({
          color: 0x4f3031,
          roughness: 0.95,
        });

        for (let index = 0; index < 7; index += 1) {
          const y = -0.48 - index * 0.052;
          const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.56, y, -0.78 - index * 0.016),
            new THREE.Vector3(-0.2, y + 0.025, -0.58),
            new THREE.Vector3(0.22, y + 0.02, -0.58),
            new THREE.Vector3(0.58, y, -0.78 - index * 0.016),
          ]);
          group.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 28, 0.01, 6, false), grooveMaterial));
        }

        return group;
      }

      function createBrainStem(THREE) {
        const group = new THREE.Group();
        const material = createMaterial(THREE, 0x9f6e62, 0.78);
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.21, 0.64, 28), material);
        stem.position.set(0.06, -0.98, -0.5);
        stem.rotation.set(-0.28, 0.1, -0.05);
        stem.castShadow = true;
        stem.receiveShadow = true;

        const bulb = new THREE.Mesh(new THREE.SphereGeometry(1, 40, 20), material);
        bulb.position.set(0.02, -0.66, -0.58);
        bulb.scale.set(0.34, 0.24, 0.3);
        bulb.castShadow = true;
        bulb.receiveShadow = true;

        group.add(stem, bulb);
        return group;
      }

      function createBrainModel(THREE) {
        const model = new THREE.Group();
        model.name = "procedural-brain-fallback";
        model.add(createHemisphere(THREE, -1));
        model.add(createHemisphere(THREE, 1));
        model.add(createCerebellum(THREE));
        model.add(createBrainStem(THREE));
        model.rotation.set(INITIAL_ROTATION.x, INITIAL_ROTATION.y, INITIAL_ROTATION.z);
        return model;
      }

      function createGlassBrainMaterial() {
        return new THREE.MeshPhysicalMaterial({
          color: 0xbfeeff,
          roughness: 0.18,
          metalness: 0,
          transparent: true,
          opacity: 0.56,
          transmission: 0.24,
          thickness: 0.78,
          ior: 1.36,
          attenuationColor: new THREE.Color(0x8fdfff),
          attenuationDistance: 2.6,
          clearcoat: 0.82,
          clearcoatRoughness: 0.12,
          specularIntensity: 1,
          specularColor: new THREE.Color(0xe5fbff),
          sheen: 0.36,
          sheenColor: new THREE.Color(0xb8f5ff),
          emissive: new THREE.Color(0x0a2430),
          emissiveIntensity: 0.16,
          side: THREE.DoubleSide,
        });
      }

      function prepareLoadedBrainModel(root) {
        const model = new THREE.Group();
        model.name = "nih-detailed-brain-model";

        const glassBrainMaterial = createGlassBrainMaterial();

        root.traverse((object) => {
          if (!object.isMesh) return;
          object.castShadow = true;
          object.receiveShadow = true;
          if (object.geometry && !object.geometry.attributes.normal) {
            object.geometry.computeVertexNormals();
          }
          object.material = glassBrainMaterial.clone();
          object.renderOrder = 2;
        });

        const bounds = new THREE.Box3().setFromObject(root);
        const center = bounds.getCenter(new THREE.Vector3());
        const size = bounds.getSize(new THREE.Vector3());
        const maxAxis = Math.max(size.x, size.y, size.z) || 1;
        root.position.sub(center);
        model.add(root);
        model.scale.setScalar(3.15 / maxAxis);
        model.rotation.set(INITIAL_ROTATION.x, INITIAL_ROTATION.y, INITIAL_ROTATION.z);
        return model;
      }

      async function loadBrainModel() {
        try {
          const loader = new GLTFLoader();
          const gltf = await loader.loadAsync(MODEL_URL);
          return prepareLoadedBrainModel(gltf.scene);
        } catch (error) {
          console.warn("High-detail GLB brain unavailable; procedural fallback displayed.", error);
          return createBrainModel(THREE);
        }
      }

      function createModuleFragmentMaterial(THREE, module, bounds) {
        return new THREE.ShaderMaterial({
          uniforms: {
            time: { value: 0 },
            explodeProgress: { value: 0 },
            selectionFocus: { value: 1 },
            brainInverse: { value: new THREE.Matrix4() },
            boundsMin: { value: bounds.min.clone() },
            boundsSize: { value: bounds.getSize(new THREE.Vector3()) },
            moduleOffset: { value: new THREE.Vector3(...module.offset) },
            moduleMin: { value: new THREE.Vector3(...module.min) },
            moduleMax: { value: new THREE.Vector3(...module.max) },
            moduleColor: { value: new THREE.Color(module.color) },
          },
          vertexShader: `
            varying vec3 vWorldPosition;
            varying vec3 vNormalDirection;

            void main() {
              vec4 worldPosition = modelMatrix * vec4(position, 1.0);
              vWorldPosition = worldPosition.xyz;
              vNormalDirection = normalize(normalMatrix * normal);
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform float time;
            uniform float explodeProgress;
            uniform float selectionFocus;
            uniform mat4 brainInverse;
            uniform vec3 boundsMin;
            uniform vec3 boundsSize;
            uniform vec3 moduleOffset;
            uniform vec3 moduleMin;
            uniform vec3 moduleMax;
            uniform vec3 moduleColor;
            varying vec3 vWorldPosition;
            varying vec3 vNormalDirection;

            float boxMask(vec3 p, vec3 mn, vec3 mx) {
              vec3 low = smoothstep(mn - vec3(0.035), mn + vec3(0.035), p);
              vec3 high = 1.0 - smoothstep(mx - vec3(0.035), mx + vec3(0.035), p);
              vec3 mask = low * high;
              return min(mask.x, min(mask.y, mask.z));
            }

            float lane(float value, float width) {
              return smoothstep(1.0 - width, 1.0, sin(value));
            }

            void main() {
              vec3 localPosition = (brainInverse * vec4(vWorldPosition, 1.0)).xyz - moduleOffset * explodeProgress;
              vec3 normalizedPosition = clamp((localPosition - boundsMin) / boundsSize, 0.0, 1.0);
              float mask = boxMask(normalizedPosition, moduleMin, moduleMax);
              if (mask < 0.11) discard;

              float groove = pow(1.0 - abs(vNormalDirection.z), 1.18);
              float movingSignal =
                lane(localPosition.x * 7.2 + localPosition.y * 4.8 + time * 1.25, 0.38) * 0.58 +
                lane(localPosition.y * 8.8 - localPosition.z * 4.4 - time * 1.05, 0.32) * 0.42;
              float edge = smoothstep(0.11, 0.38, mask);
              float reveal = smoothstep(0.04, 0.55, explodeProgress);
              float alpha = (0.11 + groove * 0.22 + movingSignal * 0.1) * edge * reveal * selectionFocus;
              vec3 glass = mix(vec3(0.62, 0.82, 0.9), moduleColor, 0.34 + groove * 0.14);
              gl_FragColor = vec4(glass, alpha);
            }
          `,
          transparent: true,
          depthWrite: false,
          depthTest: true,
          polygonOffset: true,
          polygonOffsetFactor: -2,
          polygonOffsetUnits: -2,
          blending: THREE.NormalBlending,
          side: THREE.DoubleSide,
        });
      }

      function cloneBrainFragment(THREE, brainModel, module, bounds) {
        const fragment = brainModel.clone(true);
        const materials = [];

        fragment.name = `${module.id}-exploded-brain-fragment`;
        fragment.traverse((object) => {
          if (!object.isMesh) return;
          const material = createModuleFragmentMaterial(THREE, module, bounds);
          object.material = material;
          object.castShadow = false;
          object.receiveShadow = false;
          object.renderOrder = 7;
          materials.push(material);
        });

        return { fragment, materials };
      }

      function createProjectedModule(THREE, module) {
        const group = new THREE.Group();
        const color = new THREE.Color(module.color);
        const material = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.72,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: true,
        });
        const glowMaterial = material.clone();
        glowMaterial.opacity = 0.18;
        material.userData.baseOpacity = material.opacity;
        glowMaterial.userData.baseOpacity = glowMaterial.opacity;

        if (module.type === "projected") {
          const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.52, 0.1, 0.52),
            new THREE.Vector3(-0.22, 0.32, 0.7),
            new THREE.Vector3(0.22, 0.38, 0.72),
            new THREE.Vector3(0.58, 0.14, 0.52),
          ]);
          const rail = new THREE.Mesh(new THREE.TubeGeometry(curve, 54, 0.018, 10, false), material);
          const glow = new THREE.Mesh(new THREE.TubeGeometry(curve, 54, 0.07, 12, false), glowMaterial);
          rail.name = "cingulate-projected-arc";
          glow.name = "cingulate-projected-glow";
          group.add(glow, rail);
        } else {
          const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(-0.34, -0.24, 0.42),
            new THREE.Vector3(-0.12, -0.38, 0.64),
            new THREE.Vector3(0.28, -0.35, 0.68),
            new THREE.Vector3(0.52, -0.18, 0.5),
          ]);
          const body = new THREE.Mesh(new THREE.TubeGeometry(curve, 58, 0.052, 14, false), material);
          const glow = new THREE.Mesh(new THREE.TubeGeometry(curve, 58, 0.14, 14, false), glowMaterial);
          body.name = "hippocampal-internal-body";
          glow.name = "hippocampal-internal-glow";
          group.add(glow, body);
        }

        group.name = `${module.id}-internal-projected-module`;
        return { fragment: group, materials: [material, glowMaterial] };
      }

      function setBrainMaterialOpacity(brainModel, opacityFactor) {
        brainModel.traverse((object) => {
          if (!object.isMesh || !object.material) return;
          const materials = Array.isArray(object.material) ? object.material : [object.material];
          materials.forEach((material) => {
            if (material.userData.baseOpacity === undefined) {
              material.userData.baseOpacity = material.opacity ?? 1;
            }
            material.transparent = true;
            material.opacity = material.userData.baseOpacity * opacityFactor;
          });
        });
      }

      function createExplodedResearchModules(THREE, brainModel) {
        const group = new THREE.Group();
        const bounds = new THREE.Box3().setFromObject(brainModel);
        const inverseMatrix = new THREE.Matrix4();
        const surfaceMaterials = [];
        const moduleEntries = MODULES.map((module) => {
          const entry = module.type === "surface"
            ? cloneBrainFragment(THREE, brainModel, module, bounds)
            : createProjectedModule(THREE, module);
          const wrapper = new THREE.Group();
          wrapper.name = `${module.id}-research-module`;
          wrapper.userData.moduleId = module.id;
          wrapper.userData.offset = new THREE.Vector3(...module.offset);
          wrapper.visible = false;
          wrapper.add(entry.fragment);
          group.add(wrapper);
          if (module.type === "surface") {
            surfaceMaterials.push(...entry.materials);
          }
          return { module, wrapper, materials: entry.materials };
        });
        const state = {
          expanded: false,
          selected: null,
          progress: 0,
        };

        group.name = "exploded-research-modules";
        group.visible = true;

        return {
          group,
          setExpanded(value) {
            state.expanded = value;
            if (value) {
              moduleEntries.forEach((entry) => {
                entry.wrapper.visible = true;
              });
            }
          },
          setSelected(id) {
            state.selected = id;
          },
          getState() {
            return state;
          },
          update(time, brainRoot, activityFlow) {
            const target = state.expanded ? 1 : 0;
            state.progress += (target - state.progress) * (prefersReducedMotion ? 1 : 0.08);
            const eased = state.progress * state.progress * (3 - 2 * state.progress);
            const mobile = window.innerWidth < 720;
            const baseScale = mobile ? 0.78 : 1.16;
            const baseY = mobile ? -0.18 : -0.12;
            inverseMatrix.copy(brainRoot.matrixWorld).invert();

            moduleEntries.forEach((entry) => {
              const selectedFocus = !state.selected || state.selected === entry.module.id ? 1 : 0.28;
              entry.wrapper.visible = eased > 0.015 || state.expanded;
              entry.wrapper.position.copy(entry.wrapper.userData.offset).multiplyScalar(eased);
              entry.wrapper.scale.setScalar(0.985 + eased * (state.selected === entry.module.id ? 0.075 : 0.02));
              entry.materials.forEach((material) => {
                material.opacity = (material.userData.baseOpacity ?? material.opacity ?? 1) * selectedFocus * eased;
                if (material.uniforms) {
                  material.uniforms.time.value = prefersReducedMotion ? 0 : time;
                  material.uniforms.explodeProgress.value = eased;
                  material.uniforms.selectionFocus.value = selectedFocus;
                  material.uniforms.brainInverse.value.copy(inverseMatrix);
                }
              });
            });

            surfaceMaterials.forEach((material) => {
              material.uniforms.explodeProgress.value = eased;
            });
            brainRoot.scale.setScalar(baseScale * (1 - eased * (mobile ? 0.12 : 0.24)));
            brainRoot.position.y = baseY + eased * (mobile ? 0.03 : 0.02);
            setBrainMaterialOpacity(brainModel, 1 - eased * 0.62);
            activityFlow.visible = eased < 0.96;
          },
        };
      }

      function setupModuleUi(explodedView) {
        const moduleRegion = document.getElementById("module-region");
        const moduleFolder = document.getElementById("module-folder");
        const moduleSentence = document.getElementById("module-sentence");
        const moduleButtons = [...document.querySelectorAll(".module-label")];
        const state = {
          expanded: false,
          selected: null,
        };

        function sync() {
          document.body.classList.toggle("brain-expanded", state.expanded);
          document.body.classList.toggle("module-selected", Boolean(state.selected));
          moduleButtons.forEach((button) => {
            button.setAttribute("aria-pressed", String(button.dataset.module === state.selected));
          });
          explodedView?.setExpanded(state.expanded);
          explodedView?.setSelected(state.selected);
        }

        function selectModule(id) {
          const module = MODULES.find((candidate) => candidate.id === id);
          if (!module) return;
          state.expanded = true;
          state.selected = id;
          moduleRegion.textContent = module.region;
          moduleFolder.textContent = module.folder;
          moduleFolder.href = getModuleHomepageUrl(module);
          moduleSentence.textContent = module.sentence;
          sync();
        }

        moduleButtons.forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            selectModule(button.dataset.module);
          });
        });

        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            state.expanded = false;
            state.selected = null;
            sync();
          }
        });

        sync();
        return {
          toggleExpanded() {
            state.expanded = !state.expanded;
            state.selected = null;
            sync();
          },
          selectModule,
          getState() {
            return state;
          },
        };
      }

      function collectBrainSurfaceSamples(THREE, brainModel) {
        const brainSurfaceSamples = [];
        const maxSamples = 16000;
        const worldPoint = new THREE.Vector3();
        const worldNormal = new THREE.Vector3();
        const normalMatrix = new THREE.Matrix3();

        brainModel.updateMatrixWorld(true);
        brainModel.traverse((object) => {
          if (!object.isMesh || brainSurfaceSamples.length >= maxSamples) return;
          const geometry = object.geometry;
          const position = geometry?.attributes?.position;
          if (!position) return;

          if (!geometry.attributes.normal) {
            geometry.computeVertexNormals();
          }

          const normal = geometry.attributes.normal;
          const stride = Math.max(1, Math.ceil(position.count / 1400));
          normalMatrix.getNormalMatrix(object.matrixWorld);

          for (let index = 0; index < position.count && brainSurfaceSamples.length < maxSamples; index += stride) {
            worldPoint.fromBufferAttribute(position, index).applyMatrix4(object.matrixWorld);
            worldNormal.fromBufferAttribute(normal, index).applyMatrix3(normalMatrix).normalize();
            brainSurfaceSamples.push({
              point: worldPoint.clone(),
              normal: worldNormal.clone(),
              normalZ: worldNormal.z,
            });
          }
        });

        const bounds =
          brainSurfaceSamples.length > 0
            ? new THREE.Box3().setFromPoints(brainSurfaceSamples.map((sample) => sample.point))
            : new THREE.Box3(new THREE.Vector3(-1.4, -0.9, -0.7), new THREE.Vector3(1.4, 0.9, 1.2));

        const size = bounds.getSize(new THREE.Vector3());
        const surfaceSampleGrid = {
          cells: new Map(),
          cellX: Math.max(size.x / 48, 0.001),
          cellY: Math.max(size.y / 38, 0.001),
        };

        brainSurfaceSamples.forEach((sample) => {
          const ix = Math.floor((sample.point.x - bounds.min.x) / surfaceSampleGrid.cellX);
          const iy = Math.floor((sample.point.y - bounds.min.y) / surfaceSampleGrid.cellY);
          const key = `${ix}:${iy}`;
          const cell = surfaceSampleGrid.cells.get(key);
          if (cell) {
            cell.push(sample);
          } else {
            surfaceSampleGrid.cells.set(key, [sample]);
          }
        });

        return { brainSurfaceSamples, surfaceSampleGrid, bounds };
      }

      function pickSulcalSurfacePoint(
        THREE,
        brainSurfaceSamples,
        surfaceSampleGrid,
        bounds,
        x,
        y,
        expand = 1,
        previousPoint = null,
        depthBias = 0.08,
      ) {
        const size = bounds.getSize(new THREE.Vector3());
        const xTolerance = size.x * 0.047 * expand;
        const yTolerance = size.y * 0.054 * expand;
        const visibleFront = bounds.min.z + size.z * 0.6;
        const candidates = [];
        const centerIx = Math.floor((x - bounds.min.x) / surfaceSampleGrid.cellX);
        const centerIy = Math.floor((y - bounds.min.y) / surfaceSampleGrid.cellY);
        const radiusX = Math.max(1, Math.ceil(xTolerance / surfaceSampleGrid.cellX));
        const radiusY = Math.max(1, Math.ceil(yTolerance / surfaceSampleGrid.cellY));

        for (let ix = centerIx - radiusX; ix <= centerIx + radiusX; ix += 1) {
          for (let iy = centerIy - radiusY; iy <= centerIy + radiusY; iy += 1) {
            const cell = surfaceSampleGrid.cells.get(`${ix}:${iy}`);
            if (!cell) continue;
            cell.forEach((sample) => {
              const point = sample.point;
              if (
                point.z > visibleFront &&
                Math.abs(point.x - x) <= xTolerance &&
                Math.abs(point.y - y) <= yTolerance
              ) {
                candidates.push(sample);
              }
            });
          }
        }

        if (candidates.length < 4 && expand < 3.2) {
          return pickSulcalSurfacePoint(
            THREE,
            brainSurfaceSamples,
            surfaceSampleGrid,
            bounds,
            x,
            y,
            expand + 0.45,
            previousPoint,
            depthBias,
          );
        }

        if (candidates.length === 0) return null;

        candidates.sort((a, b) => b.point.z - a.point.z);
        const sidewallCandidates = candidates.filter((sample) => Math.abs(sample.normalZ) < 0.86);
        const sulcalCandidates = sidewallCandidates.length >= 4 ? sidewallCandidates : candidates;
        const depthTarget =
          sulcalCandidates[Math.min(sulcalCandidates.length - 1, Math.floor(sulcalCandidates.length * depthBias))]
            .point.z;

        if (previousPoint) {
          const maxStep = size.x * 0.18;
          const continuousCandidates = sulcalCandidates.filter(
            (sample) => sample.point.distanceTo(previousPoint) < maxStep,
          );
          const continuityPool = continuousCandidates.length >= 3 ? continuousCandidates : sulcalCandidates;
          continuityPool.sort((a, b) => {
            const aDistance = a.point.distanceTo(previousPoint);
            const bDistance = b.point.distanceTo(previousPoint);
            const aDepth = Math.abs(a.point.z - previousPoint.z);
            const bDepth = Math.abs(b.point.z - previousPoint.z);
            const aGroove = Math.abs(a.point.z - depthTarget);
            const bGroove = Math.abs(b.point.z - depthTarget);
            return aDistance + aDepth * 0.36 + aGroove * 0.76 - (1 - Math.abs(a.normalZ)) * 0.05
              - (bDistance + bDepth * 0.36 + bGroove * 0.76 - (1 - Math.abs(b.normalZ)) * 0.05);
          });
          const continuous = continuityPool[0];
          return continuous.point.clone().add(continuous.normal.clone().multiplyScalar(0.124));
        }

        const sulcalIndex = Math.min(
          sulcalCandidates.length - 1,
          Math.floor(sulcalCandidates.length * depthBias),
        );
        const selected = sulcalCandidates[sulcalIndex];

        return selected.point.clone().add(selected.normal.clone().multiplyScalar(0.124));
      }

      function smoothSulcalFlowPath(THREE, points) {
        let smoothed = points.map((point) => point.clone());
        for (let pass = 0; pass < 2; pass += 1) {
          smoothed = smoothed.map((point, index) => {
            if (index === 0 || index === smoothed.length - 1) return point.clone();
            return new THREE.Vector3()
              .copy(smoothed[index - 1])
              .add(point.clone().multiplyScalar(2.2))
              .add(smoothed[index + 1])
              .divideScalar(4.2);
          });
        }
        return smoothed;
      }

      function createFallbackSulcalFlowPaths(THREE) {
        const fallbackRows = [
          0.58, 0.42, 0.27, 0.1, -0.06, -0.22, -0.38, -0.54,
        ];
        return fallbackRows.map((row, rowIndex) => {
          const points = [];
          for (let step = 0; step < 15; step += 1) {
            const u = step / 14;
            const x = -1.1 + u * 2.2;
            const y = row + Math.sin(u * Math.PI * 2.2 + rowIndex * 0.7) * 0.045;
            const z = 1.05 + Math.sin(u * Math.PI + rowIndex * 0.4) * 0.16;
            points.push(new THREE.Vector3(x, y, z));
          }
          return points;
        });
      }

      function buildSulcalFlowPaths(THREE, brainSurfaceSamples, surfaceSampleGrid, bounds) {
        if (brainSurfaceSamples.length === 0) {
          return createFallbackSulcalFlowPaths(THREE);
        }

        const size = bounds.getSize(new THREE.Vector3());
        const xMin = bounds.min.x + size.x * 0.06;
        const xMax = bounds.max.x - size.x * 0.06;
        const yMin = bounds.min.y + size.y * 0.08;
        const yMax = bounds.max.y - size.y * 0.08;
        const sulcalFlowPaths = [];

        for (let row = 0; row < 18; row += 1) {
          const v = (row + 0.5) / 18;
          const baseY = yMax + (yMin - yMax) * v;
          const phase = row * 0.73;
          const points = [];
          let previousPoint = null;

          for (let step = 0; step < 22; step += 1) {
            const u = step / 21;
            const x = xMin + (xMax - xMin) * u;
            const longWave = Math.sin(u * Math.PI * 2.1 + phase) * size.y * 0.018;
            const shortWave = Math.sin(u * Math.PI * 5.2 + phase * 0.6) * size.y * 0.006;
            const point = pickSulcalSurfacePoint(
              THREE,
              brainSurfaceSamples,
              surfaceSampleGrid,
              bounds,
              x,
              baseY + longWave + shortWave,
              1 + (row % 3) * 0.12,
              previousPoint,
              0.02 + (row % 4) * 0.024,
            );
            if (point) {
              points.push(point);
              previousPoint = point;
            }
          }

          if (points.length >= 7) {
            sulcalFlowPaths.push(smoothSulcalFlowPath(THREE, points));
          }
        }

        for (let band = 0; band < 10; band += 1) {
          const v = (band + 0.5) / 10;
          const baseX = xMin + (xMax - xMin) * v;
          const phase = band * 0.57;
          const points = [];
          let previousPoint = null;

          for (let step = 0; step < 14; step += 1) {
            const u = step / 13;
            const y = yMax + (yMin - yMax) * u;
            const x = baseX + Math.sin(u * Math.PI * 1.7 + phase) * size.x * 0.05;
            const point = pickSulcalSurfacePoint(
              THREE,
              brainSurfaceSamples,
              surfaceSampleGrid,
              bounds,
              x,
              y,
              1.08,
              previousPoint,
              0.02 + (band % 5) * 0.022,
            );
            if (point) {
              points.push(point);
              previousPoint = point;
            }
          }

          if (points.length >= 6) {
            sulcalFlowPaths.push(smoothSulcalFlowPath(THREE, points));
          }
        }

        for (let cluster = 0; cluster < 14; cluster += 1) {
          const cx = xMin + (xMax - xMin) * ((cluster % 6) + 0.5) / 6;
          const cy = yMax + (yMin - yMax) * (Math.floor(cluster / 6) + 0.5) / 4;
          const span = size.x * (0.12 + (cluster % 3) * 0.02);
          const points = [];
          let previousPoint = null;

          for (let step = 0; step < 10; step += 1) {
            const u = step / 9;
            const x = cx + (u - 0.5) * span;
            const y =
              cy +
              Math.sin(u * Math.PI * 1.4 + cluster * 0.45) * size.y * 0.035 +
              (u - 0.5) * size.y * 0.04;
            const point = pickSulcalSurfacePoint(
              THREE,
              brainSurfaceSamples,
              surfaceSampleGrid,
              bounds,
              x,
              y,
              1.16,
              previousPoint,
              0.02 + (cluster % 4) * 0.024,
            );
            if (point) {
              points.push(point);
              previousPoint = point;
            }
          }

          if (points.length >= 5) {
            sulcalFlowPaths.push(smoothSulcalFlowPath(THREE, points));
          }
        }

        return sulcalFlowPaths.length > 0 ? sulcalFlowPaths : createFallbackSulcalFlowPaths(THREE);
      }

      function createRibbonGeometry(THREE, curve, width, segments) {
        const positions = [];
        const uvs = [];
        const indices = [];
        const tangent = new THREE.Vector3();
        const widthDirection = new THREE.Vector3();

        for (let index = 0; index <= segments; index += 1) {
          const t = index / segments;
          const point = curve.getPointAt(t);
          curve.getTangentAt(t, tangent).normalize();
          widthDirection.set(-tangent.y, tangent.x, 0);
          if (widthDirection.lengthSq() < 0.0001) {
            widthDirection.set(1, 0, 0);
          }
          widthDirection.normalize().multiplyScalar(width * 0.5);

          positions.push(
            point.x - widthDirection.x,
            point.y - widthDirection.y,
            point.z - widthDirection.z,
            point.x + widthDirection.x,
            point.y + widthDirection.y,
            point.z + widthDirection.z,
          );
          uvs.push(t, 0, t, 1);

          if (index < segments) {
            const base = index * 2;
            indices.push(base, base + 1, base + 2, base + 1, base + 3, base + 2);
          }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        return geometry;
      }

      function createFlowRibbonTexture(THREE, railColor, pulseColor) {
        const canvas = document.createElement("canvas");
        canvas.width = 320;
        canvas.height = 24;
        const context = canvas.getContext("2d");
        const rail = new THREE.Color(railColor);
        const pulse = new THREE.Color(pulseColor);
        const toRgb = (color, alpha) =>
          `rgba(${Math.round(color.r * 255)}, ${Math.round(color.g * 255)}, ${Math.round(color.b * 255)}, ${alpha})`;

        context.clearRect(0, 0, canvas.width, canvas.height);
        for (let index = 0; index < 4; index += 1) {
          const start = index * 84 - 34;
          const gradient = context.createLinearGradient(start, 0, start + 118, 0);
          gradient.addColorStop(0, toRgb(rail, 0));
          gradient.addColorStop(0.22, toRgb(rail, 0.28));
          gradient.addColorStop(0.5, toRgb(pulse, 0.94));
          gradient.addColorStop(0.76, toRgb(rail, 0.24));
          gradient.addColorStop(1, toRgb(rail, 0));
          context.fillStyle = gradient;
          context.fillRect(start, 0, 118, canvas.height);
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        texture.repeat.set(1.8, 1);
        texture.needsUpdate = true;
        return texture;
      }

      function createSulcalSurfaceFlowSkin(THREE, brainModel) {
        const skin = brainModel.clone(true);
        const surfaceFlowMaterials = [];

        skin.name = "sulcal-flow-surface-skin";
        skin.scale.multiplyScalar(1.014);

        skin.traverse((object) => {
          if (!object.isMesh) return;

          const material = new THREE.ShaderMaterial({
            uniforms: {
              time: { value: 0 },
              cyan: { value: new THREE.Color(0x5ef5ff) },
              magenta: { value: new THREE.Color(0xff4ce8) },
              gold: { value: new THREE.Color(0xffd35a) },
            },
            vertexShader: `
              varying vec3 vWorldPosition;
              varying vec3 vNormalDirection;

              void main() {
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPosition.xyz;
                vNormalDirection = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              uniform float time;
              uniform vec3 cyan;
              uniform vec3 magenta;
              uniform vec3 gold;
              varying vec3 vWorldPosition;
              varying vec3 vNormalDirection;

              float lane(float value, float width) {
                return smoothstep(1.0 - width, 1.0, sin(value));
              }

              void main() {
                vec3 p = vWorldPosition;
                float grooveWall = pow(1.0 - abs(vNormalDirection.z), 1.16);
                float lateralFade = smoothstep(-2.45, -1.86, p.x) * (1.0 - smoothstep(1.82, 2.42, p.x));
                float verticalFade = smoothstep(-1.58, -1.24, p.y) * (1.0 - smoothstep(1.14, 1.52, p.y));
                float foldBias = 0.18 + grooveWall * 0.82;
                float mask = foldBias * lateralFade * verticalFade;

                float a = lane(p.x * 7.0 + p.y * 4.2 + sin(p.z * 5.2 + p.y * 1.3 + time * 0.82) + time * 1.5, 0.42);
                float b = lane(p.x * -5.6 + p.y * 7.4 + cos(p.z * 4.8 - p.x * 1.1 - time * 0.68) - time * 1.08, 0.38);
                float c = lane(p.y * 8.7 + p.z * 5.5 + sin(p.x * 3.0 + p.y * 0.9 + time) + time * 1.25, 0.34);
                float fine = lane(p.x * 11.8 - p.y * 6.2 + sin(p.z * 7.2 + time * 1.35), 0.26);
                float flow = max(max(a, b * 0.92), max(c * 0.78, fine * 0.48));
                float alpha = flow * mask * 0.66;

                vec3 color = mix(cyan, magenta, b);
                color = mix(color, gold, c * 0.72);
                gl_FragColor = vec4(color, alpha);
              }
            `,
            transparent: true,
            depthWrite: false,
            depthTest: true,
            polygonOffset: true,
            polygonOffsetFactor: -3,
            polygonOffsetUnits: -3,
            blending: THREE.AdditiveBlending,
            side: THREE.FrontSide,
          });

          object.material = material;
          object.castShadow = false;
          object.receiveShadow = false;
          object.renderOrder = 3;
          surfaceFlowMaterials.push(material);
        });

        return { skin, surfaceFlowMaterials };
      }

      function createSulcalActivityFlow(THREE, brainModel) {
        const group = new THREE.Group();
        group.name = "activity-flow";

        const flowPalette = [
          { rail: 0x35f6ff, pulse: 0x58fbff, glow: 0x39f0ff },
          { rail: 0xff43ec, pulse: 0xff76f2, glow: 0xff45d8 },
          { rail: 0xffc142, pulse: 0xffdf63, glow: 0xffb23d },
          { rail: 0x90ff5e, pulse: 0xb8ff78, glow: 0x72ff73 },
        ];

        const { brainSurfaceSamples, surfaceSampleGrid, bounds } = collectBrainSurfaceSamples(THREE, brainModel);
        const sulcalFlowPaths = buildSulcalFlowPaths(THREE, brainSurfaceSamples, surfaceSampleGrid, bounds);

        const createFlowMaterial = (color, opacity, additive = true) =>
          new THREE.MeshBasicMaterial({
            color,
            transparent: true,
            opacity,
            blending: additive ? THREE.AdditiveBlending : THREE.NormalBlending,
            depthWrite: false,
            depthTest: true,
          });

        const { skin: sulcalFlowSkin, surfaceFlowMaterials } = createSulcalSurfaceFlowSkin(THREE, brainModel);
        group.add(sulcalFlowSkin);

        const pulseGeometry = new THREE.SphereGeometry(0.018, 12, 8);
        const glowGeometry = new THREE.SphereGeometry(0.052, 14, 8);
        const flowPulses = [];
        const flowTextures = [];

        sulcalFlowPaths.forEach((points, pathIndex) => {
          const curve = new THREE.CatmullRomCurve3(
            points,
            false,
            "catmullrom",
            0.38,
          );
          const color = flowPalette[pathIndex % flowPalette.length];
          const ribbonTexture = createFlowRibbonTexture(THREE, color.rail, color.pulse);
          const ribbonMaterial = new THREE.MeshBasicMaterial({
            map: ribbonTexture,
            color: 0xffffff,
            transparent: true,
            opacity: prefersReducedMotion ? 0.035 : 0.055,
            blending: THREE.NormalBlending,
            depthWrite: false,
            depthTest: true,
            side: THREE.DoubleSide,
          });
          const coreMaterial = createFlowMaterial(color.pulse, prefersReducedMotion ? 0.012 : 0.02);
          const pulseMaterial = createFlowMaterial(color.pulse, 0.24);
          const glowMaterial = createFlowMaterial(color.glow, 0.035);
          const ribbon = new THREE.Mesh(createRibbonGeometry(THREE, curve, 0.036, 52), ribbonMaterial);
          const rail = new THREE.Mesh(new THREE.TubeGeometry(curve, 52, 0.0028, 5, false), coreMaterial);
          ribbon.name = "sulcal-flow-ribbon";
          rail.name = "sulcal-flow-ribbon-core";
          ribbon.renderOrder = 4;
          rail.renderOrder = 4;
          group.add(ribbon, rail);
          flowTextures.push({
            texture: ribbonTexture,
            phase: (pathIndex * 0.19) % 1,
            speed: 0.045 + (pathIndex % 5) * 0.007,
          });

          const pulseCount = pathIndex % 5 === 0 ? 1 : 0;
          for (let pulseIndex = 0; pulseIndex < pulseCount; pulseIndex += 1) {
            const marker = new THREE.Group();
            const glow = new THREE.Mesh(glowGeometry, glowMaterial.clone());
            const pulse = new THREE.Mesh(pulseGeometry, pulseMaterial.clone());
            marker.add(glow, pulse);
            marker.renderOrder = 5;
            group.add(marker);

            flowPulses.push({
              marker,
              curve,
              phase: (pulseIndex / pulseCount + pathIndex * 0.071) % 1,
              speed: 0.022 + (pathIndex % 7) * 0.0036,
              glow,
              pulse,
            });
          }
        });

        group.userData.brainSurfaceSamples = brainSurfaceSamples.length;
        group.userData.sulcalFlowPaths = sulcalFlowPaths.length;
        group.userData.surfaceFlowMaterials = surfaceFlowMaterials;
        group.userData.flowTextures = flowTextures;
        group.userData.flowPulses = flowPulses;
        group.userData.update = (time) => {
          surfaceFlowMaterials.forEach((material) => {
            material.uniforms.time.value = prefersReducedMotion ? 0 : time;
          });
          flowTextures.forEach((item) => {
            item.texture.offset.x = prefersReducedMotion ? item.phase : (item.phase - time * item.speed) % 1;
          });
          flowPulses.forEach((item, index) => {
            const t = prefersReducedMotion ? item.phase : (item.phase + time * item.speed) % 1;
            const point = item.curve.getPointAt(t);
            const shimmer = 0.68 + Math.sin(time * 4.6 + index * 1.37) * 0.22;
            item.marker.position.copy(point);
            item.marker.scale.setScalar(0.62 + shimmer * 0.22);
            item.glow.material.opacity = (prefersReducedMotion ? 0.025 : 0.06) * shimmer;
            item.pulse.material.opacity = (prefersReducedMotion ? 0.16 : 0.34) * shimmer;
          });
        };

        return group;
      }

      const CHIP_LAYOUT = [
        {
          id: "association",

          position: [-3.45, 1.36, 0.12],
          connectorSide: "right",
          route: [[0, -1.56, 0.12], [-0.78, -1.56, 0.12], [-0.78, 1.36, 0.12], [-2.35, 1.36, 0.12]],
        },

      const CHIP_DISPLAY_MODULE_SCALE = 1.32;
