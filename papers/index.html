<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Literature Library | NeuroScience x AI</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='20' fill='%23f4efe3'/%3E%3Cpath fill='%231f2724' d='M39 12C22 21 14 34 14 49c0 16 9 29 25 35-8-13-10-25-5-36-5-10-3-22 5-36Z'/%3E%3Cpath fill='%231f2724' d='M57 12c17 9 25 22 25 37 0 16-9 29-25 35 8-13 10-25 5-36 5-10 3-22-5-36Z'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2724;
        --ink-muted: rgba(31, 39, 36, 0.66);
        --paper: #f4efe3;
        --paper-soft: #fbf8ef;
        --paper-warm: #e8dcc8;
        --paper-fiber: rgba(109, 88, 53, 0.032);
        --paper-speck: rgba(49, 41, 30, 0.035);
        --grid-line: rgba(31, 39, 36, 0.018);
        --edge: rgba(31, 39, 36, 0.18);
        --edge-strong: rgba(31, 39, 36, 0.3);
        --blue: #2e6f77;
        --green: #517c57;
        --seal-red: #b24338;
        --gold: #a47c38;
        --ink-shadow: rgba(42, 35, 25, 0.1);
        font-family:
          "Inter", "SF Pro Display", "PingFang SC", "Noto Sans SC", system-ui,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 14% 18%, var(--paper-speck) 0 0.7px, transparent 1px),
          radial-gradient(circle at 78% 32%, rgba(164, 124, 56, 0.04) 0 0.8px, transparent 1.2px),
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
          linear-gradient(118deg, rgba(255, 252, 244, 0.42) 0%, transparent 46%),
          linear-gradient(145deg, var(--paper-soft) 0%, var(--paper) 62%, var(--paper-warm) 100%);
        background-size:
          42px 42px,
          58px 58px,
          74px 74px,
          74px 74px,
          auto,
          auto;
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        z-index: 0;
        content: "";
        pointer-events: none;
      }

      body::before {
        background:
          repeating-linear-gradient(8deg, transparent 0 18px, var(--paper-fiber) 18px 19px),
          repeating-linear-gradient(96deg, transparent 0 34px, rgba(31, 39, 36, 0.018) 34px 35px);
        mix-blend-mode: multiply;
        opacity: 0.74;
      }

      body::after {
        background:
          radial-gradient(circle at 28% 22%, rgba(164, 124, 56, 0.045), transparent 22%),
          radial-gradient(circle at 70% 74%, rgba(31, 39, 36, 0.03), transparent 26%);
        opacity: 0.56;
      }

      a {
        color: inherit;
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: clamp(22px, 5vw, 56px) 0 48px;
      }

      .home-logo-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: clamp(58px, 7vw, 86px);
        height: clamp(48px, 5.8vw, 70px);
        margin-left: clamp(-18px, -1.4vw, -8px);
        color: var(--ink);
        text-decoration: none;
      }

      .home-logo-link:hover {
        color: var(--blue);
      }

      .home-logo-link:focus-visible,
      .project-card:focus-visible {
        outline: 2px solid rgba(46, 111, 119, 0.58);
        outline-offset: 4px;
      }

      .title-x-mark {
        width: 24px;
        height: 20px;
        flex: 0 0 auto;
        overflow: visible;
        color: var(--ink);
      }

      .home-logo-link .title-x-mark {
        width: 100%;
        height: 100%;
      }

      .title-x-left-bleed,
      .title-x-left-core,
      .title-x-right-core {
        transform-box: fill-box;
        transform-origin: center;
        fill: currentColor;
      }

      .title-x-left-bleed {
        opacity: 0.24;
        filter: blur(0.45px);
      }

      .title-x-left-core {
        opacity: 0.94;
      }

      .title-x-right-core {
        opacity: 0.98;
      }

      .hero {
        display: grid;
        gap: 18px;
        padding: clamp(20px, 5vw, 48px) 0 clamp(22px, 4vw, 38px);
      }

      h1 {
        display: flex;
        flex-wrap: wrap;
        column-gap: 0.24em;
        max-width: 880px;
        margin: 0 0 0 clamp(10px, 2vw, 28px);
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: 104px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.96;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .title-line {
        display: inline-block;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 430px));
        gap: 14px;
      }

      .project-card {
        position: relative;
        isolation: isolate;
        display: grid;
        min-height: 212px;
        place-items: center;
        overflow: hidden;
        border: 0;
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(255, 252, 244, 0.68), rgba(240, 231, 213, 0.46)),
          rgba(251, 248, 239, 0.58);
        padding: clamp(24px, 4vw, 34px);
        color: inherit;
        text-decoration: none;
        backdrop-filter: blur(8px) saturate(0.94);
        -webkit-backdrop-filter: blur(8px) saturate(0.94);
        box-shadow:
          inset 0 1px 0 rgba(255, 252, 244, 0.72),
          inset 0 -28px 52px rgba(180, 156, 115, 0.08),
          0 28px 76px var(--ink-shadow),
          0 9px 28px rgba(31, 39, 36, 0.07);
        transition:
          transform 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .project-card::before {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 2;
        width: 18px;
        aspect-ratio: 1;
        border-radius: 2px;
        content: "";
        background:
          radial-gradient(circle at 32% 28%, rgba(214, 93, 72, 0.82), transparent 58%),
          linear-gradient(135deg, var(--seal-red), rgba(112, 38, 34, 0.78));
        box-shadow:
          0 0 0 1px rgba(112, 38, 34, 0.1),
          0 10px 22px rgba(178, 67, 56, 0.12);
        opacity: 0.88;
        transform: rotate(-2deg);
      }

      .project-card::after {
        position: absolute;
        inset: 0;
        z-index: -1;
        content: "";
        background:
          repeating-linear-gradient(12deg, transparent 0 16px, rgba(109, 88, 53, 0.026) 16px 17px),
          radial-gradient(circle at 50% 44%, rgba(255, 255, 255, 0.28), transparent 58%);
        mix-blend-mode: multiply;
        opacity: 0.62;
      }

      .project-card:hover {
        background:
          linear-gradient(145deg, rgba(255, 252, 244, 0.78), rgba(240, 231, 213, 0.56)),
          rgba(251, 248, 239, 0.66);
        box-shadow:
          inset 0 1px 0 rgba(255, 252, 244, 0.82),
          inset 0 -28px 52px rgba(180, 156, 115, 0.09),
          0 34px 86px rgba(42, 35, 25, 0.12),
          0 12px 30px rgba(31, 39, 36, 0.08);
        transform: translateY(-2px);
      }

      .project-card h2 {
        position: relative;
        z-index: 1;
        max-width: 12ch;
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: 34px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.08;
        text-align: center;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .empty {
        border: 1px dashed var(--edge-strong);
        border-radius: 8px;
        background: rgba(251, 248, 239, 0.48);
        padding: 18px;
        color: var(--ink-muted);
        line-height: 1.7;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 900px) {
        h1 {
          display: grid;
          font-size: 54px;
        }
      }

      @media (max-width: 720px) {
        .shell {
          width: calc(100vw - 24px);
          max-width: 1120px;
          padding-top: 14px;
        }

        .home-logo-link {
          margin-left: -8px;
        }

        h1 {
          font-size: 54px;
          margin-left: 10px;
        }

        .project-grid {
          width: 100%;
        }

        .project-grid {
          grid-template-columns: minmax(0, 1fr);
        }

        .project-card h2 {
          font-size: 28px;
        }
      }

      @media (max-width: 420px) {
        h1 {
          display: grid;
          font-size: 48px;
        }
      }
    </style>
  </head>
  <body data-page="papers-homepage">
    <div class="shell">
      <header>
        <section class="hero" aria-labelledby="page-title">
          <a class="home-logo-link" href="../index.html" aria-label="Back to NeuroScience x AI homepage">
            <svg class="title-x-mark" viewBox="0 0 96 96" aria-hidden="true" focusable="false">
              <path class="title-x-left-bleed" d="M39 10 C22 19 13 34 13 49 C13 66 23 81 41 88 C32 73 29 59 34 48 C29 38 31 24 39 10 Z" />
              <path class="title-x-left-core" d="M41 13 C26 22 18 35 18 49 C18 63 27 76 41 83 C35 71 33 59 38 48 C33 38 35 25 41 13 Z" />
              <path class="title-x-right-core" d="M55 13 C70 22 78 35 78 49 C78 63 69 76 55 83 C61 71 63 59 58 48 C63 38 61 25 55 13 Z" />
            </svg>
          </a>
          <h1 id="page-title">
            <span class="title-line">Literature</span>
            <span class="title-line">Library</span>
          </h1>
        </section>
      </header>

      <main aria-label="Project paper modules">
        <div id="project-empty" class="empty" hidden>还没有登记 paper 项目。</div>
        <section id="project-grid" class="project-grid" aria-live="polite"></section>
      </main>
    </div>

    <script type="module">
      const MANIFEST_LABEL = "papers/manifest.json";
      const MANIFEST_URL = "manifest.json";

      const els = {
        grid: document.getElementById("project-grid"),
        empty: document.getElementById("project-empty"),
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function normalizeProject(record) {
        return {
          title: String(record.title ?? "Untitled project"),
          folder: String(record.folder ?? ""),
        };
      }

      function renderProjects(projects) {
        els.grid.replaceChildren();
        els.empty.hidden = projects.length !== 0;

        for (const project of projects) {
          const card = document.createElement("a");
          card.className = "project-card";
          card.href = project.folder;
          card.innerHTML = `
            <h2>${escapeHtml(project.title)}</h2>
          `;
          els.grid.append(card);
        }
      }

      async function loadProjects() {
        try {
          const response = await fetch(MANIFEST_URL);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const records = await response.json();
          if (!Array.isArray(records)) throw new Error("manifest is not an array");
          renderProjects(records.map(normalizeProject));
        } catch (error) {
          els.empty.hidden = false;
          els.empty.textContent = `无法加载 ${MANIFEST_LABEL}: ${error.message}`;
        }
      }

      void loadProjects();
    </script>
  </body>
</html>
