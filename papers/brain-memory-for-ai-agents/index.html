    <style>
      :root {
        color-scheme: light;
        --ink: #1f2724;
        --ink-muted: rgba(31, 39, 36, 0.66);
        --paper: #f4efe3;
        --paper-soft: #fbf8ef;
        --paper-warm: #e8dcc8;
        --edge: rgba(31, 39, 36, 0.18);
        --edge-strong: rgba(31, 39, 36, 0.3);
        --blue: #2e6f77;
        --shadow: rgba(42, 35, 25, 0.12);
        font-family:
          "Inter", "SF Pro Display", "PingFang SC", "Noto Sans SC", system-ui,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(rgba(31, 39, 36, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(31, 39, 36, 0.04) 1px, transparent 1px),
          linear-gradient(145deg, var(--paper-soft) 0%, var(--paper) 58%, var(--paper-warm) 100%);
        background-size:
          68px 68px,
          68px 68px,
          auto;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        content: "";
        pointer-events: none;
        background:
          repeating-linear-gradient(9deg, transparent 0 18px, rgba(107, 86, 52, 0.035) 18px 19px),
          repeating-linear-gradient(91deg, transparent 0 32px, rgba(31, 39, 36, 0.026) 32px 33px);
        mix-blend-mode: multiply;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: clamp(22px, 5vw, 56px) 0 52px;
      }

      .back-link {
        display: inline-flex;
        width: fit-content;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(31, 39, 36, 0.26);
        color: var(--ink-muted);
        font-size: 14px;
        text-decoration: none;
      }

      .back-link:hover {
        color: var(--blue);
      }

      .back-link:focus-visible,
      .paper-link:focus-visible {
        outline: 2px solid rgba(46, 111, 119, 0.58);
        outline-offset: 4px;
      }

      h1 {
        max-width: 980px;
        margin: 0 0 28px;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: clamp(48px, 9vw, 104px);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 0.98;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .summary {
        max-width: 760px;
        margin: 0 0 28px;
        color: var(--ink-muted);
        font-size: 18px;
        line-height: 1.75;
      }

      .paper-list {
        display: grid;
        max-width: 760px;
        gap: 12px;
      }

      .empty,
      .paper-link {
        border: 1px solid var(--edge);
        border-radius: 8px;
        background: rgba(251, 248, 239, 0.72);
        padding: 16px;
      }

      .empty {
        border-style: dashed;
        border-color: var(--edge-strong);
        color: var(--ink-muted);
        line-height: 1.7;
      }

      .paper-link {
        color: inherit;
        text-decoration: none;
        box-shadow:
          inset 0 0 0 1px rgba(255, 252, 244, 0.54),
          0 16px 36px var(--shadow);
      }

      .paper-link:hover {
        border-color: rgba(46, 111, 119, 0.42);
        background: rgba(251, 248, 239, 0.86);
      }

      @media (max-width: 720px) {
        .shell {
          width: calc(100vw - 24px);
          padding-top: 18px;
        }

        .summary {
          font-size: 16px;
        }
      }
    </style>
  </head>
